<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Face2Info 检索结果</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f4f7fb;
      --surface: #ffffff;
      --surface-muted: #f8fafc;
      --surface-blue: #eff6ff;
      --border: #d9e2ef;
      --border-strong: #a9b8cc;
      --text: #0b1220;
      --muted: #526071;
      --primary: #2563eb;
      --primary-strong: #1d4ed8;
      --primary-soft: #dbeafe;
      --shadow: 0 18px 46px rgba(15, 23, 42, 0.08);
      --radius: 8px;
      --radius-sm: 6px;
      --focus: 0 0 0 3px rgba(37, 99, 235, 0.24);
    }

    * { box-sizing: border-box; }

    html {
      -webkit-text-size-adjust: 100%;
    }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", "Noto Sans CJK SC", Arial, sans-serif;
      background: linear-gradient(180deg, #ffffff 0%, var(--bg) 58%, #eef4ff 100%);
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      z-index: -1;
      pointer-events: none;
      background-image:
        linear-gradient(rgba(37, 99, 235, 0.045) 1px, transparent 1px),
        linear-gradient(90deg, rgba(37, 99, 235, 0.045) 1px, transparent 1px);
      background-size: 44px 44px;
      mask-image: linear-gradient(180deg, #000 0%, transparent 72%);
    }

    .page {
      width: min(1240px, calc(100% - 32px));
      margin: 0 auto;
      padding: 24px 0 40px;
      display: grid;
      gap: 16px;
    }

    .result-layout {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 320px;
      gap: 16px;
      align-items: start;
      min-width: 0;
    }

    .main-column {
      display: grid;
      gap: 16px;
      min-width: 0;
    }

    .match-rail {
      position: sticky;
      top: 16px;
      min-width: 0;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 24px;
      min-width: 0;
    }

    .hero {
      display: grid;
      gap: 10px;
      padding: 2px 0 16px;
      border-bottom: 1px solid var(--border);
    }

    .hero-top {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      justify-content: space-between;
      align-items: center;
    }

    .hero h1,
    .section-title h2 {
      margin: 0;
      letter-spacing: 0;
      color: var(--text);
    }

    .hero h1 {
      max-width: 760px;
      font-size: clamp(30px, 4vw, 48px);
      line-height: 1.08;
      font-weight: 750;
    }

    .section-title h2 {
      font-size: clamp(20px, 2vw, 28px);
      line-height: 1.22;
    }

    .eyebrow,
    .chip {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: fit-content;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 700;
      line-height: 1.3;
      letter-spacing: 0;
    }

    .eyebrow {
      padding: 7px 10px;
      color: var(--primary);
      background: var(--primary-soft);
      border: 1px solid rgba(37, 99, 235, 0.16);
    }

    .chip {
      padding: 7px 12px;
      color: var(--primary);
      background: var(--surface-blue);
      border: 1px solid rgba(37, 99, 235, 0.14);
    }

    .hero-copy,
    .empty,
    .item p,
    .meta-line,
    .image-source,
    .person-summary {
      color: var(--muted);
      line-height: 1.65;
      overflow-wrap: anywhere;
    }

    .hero-copy {
      max-width: 760px;
      margin: 0;
      font-size: 16px;
    }

    .back-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 44px;
      padding: 10px 14px;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      background: #fff;
      color: var(--text);
      text-decoration: none;
      font-weight: 700;
      transition: border-color 0.18s ease, box-shadow 0.18s ease, color 0.18s ease;
    }

    .back-link:hover {
      border-color: rgba(37, 99, 235, 0.48);
      color: var(--primary);
      box-shadow: 0 10px 22px rgba(15, 23, 42, 0.08);
    }

    .back-link:focus-visible,
    a:focus-visible,
    summary:focus-visible {
      outline: none;
      box-shadow: var(--focus);
    }

    .section-title {
      display: grid;
      gap: 10px;
    }

    .section-header {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: flex-start;
      margin-bottom: 14px;
    }

    .person-intro {
      display: flex;
      gap: 16px;
      align-items: flex-start;
    }

    .person-copy {
      flex: 1;
      min-width: 0;
    }

    .person-summary {
      margin: 0;
      font-size: 15px;
      display: grid;
      gap: 12px;
    }

    .summary-paragraph,
    .profile-section-paragraph {
      display: flex;
      flex-wrap: wrap;
      align-items: flex-end;
      gap: 8px;
    }

    .summary-paragraph-text,
    .profile-section-body {
      color: var(--muted);
      line-height: 1.75;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
      font-size: 15px;
    }

    .summary-paragraph-text {
      flex: 1 1 100%;
    }

    .profile-sections {
      display: grid;
      grid-template-columns: 1fr;
      gap: 14px;
      margin-top: 16px;
    }

    .profile-section {
      padding: 18px 20px;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      background: linear-gradient(180deg, #ffffff 0%, var(--surface-muted) 100%);
      min-width: 0;
    }

    .profile-section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 10px;
    }

    .profile-section-title {
      margin: 0;
      font-size: 20px;
      line-height: 1.3;
      letter-spacing: 0;
    }

    .profile-section-body {
      flex: 1 1 100%;
    }

    .profile-section-empty {
      color: var(--muted);
    }

    .vision-grid {
      display: grid;
      gap: 12px;
    }

    .vision-card {
      display: grid;
      gap: 12px;
      padding: 16px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--surface-muted);
    }

    .vision-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }

    .vision-summary {
      margin: 0;
      color: var(--muted);
      line-height: 1.7;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
    }

    .portrait-image {
      width: 100%;
      max-height: 220px;
      object-fit: cover;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--surface);
    }

    .fingerprint-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 8px;
    }

    .fingerprint-item {
      display: grid;
      gap: 4px;
      padding: 10px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--surface);
      min-width: 0;
    }

    .fingerprint-key {
      color: var(--muted);
      font-size: 12px;
    }

    .fingerprint-value {
      overflow-wrap: anywhere;
      line-height: 1.5;
    }

    .vision-source-list {
      display: grid;
      gap: 8px;
      margin: 0;
      padding: 0;
      list-style: none;
    }

    .vision-source-list a,
    .vision-source-list span {
      overflow-wrap: anywhere;
    }

    .source-footnote {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 24px;
      height: 24px;
      padding: 0 7px;
      border-radius: 999px;
      background: var(--primary-soft);
      color: var(--primary);
      text-decoration: none;
      font-size: 12px;
      line-height: 1;
      font-weight: 700;
    }

    .citation-tooltip {
      position: relative;
    }

    .citation-tooltip::after {
      content: attr(data-tooltip);
      position: absolute;
      left: 50%;
      bottom: calc(100% + 10px);
      transform: translateX(-50%);
      min-width: 220px;
      max-width: min(320px, 72vw);
      padding: 10px 12px;
      border-radius: var(--radius);
      background: rgba(11, 18, 32, 0.96);
      color: #f8fafc;
      font-size: 12px;
      line-height: 1.6;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
      box-shadow: 0 16px 28px rgba(15, 23, 42, 0.24);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.16s ease;
      z-index: 20;
    }

    .citation-tooltip:hover::after,
    .citation-tooltip:focus-visible::after {
      opacity: 1;
    }

    .source-footnote:hover {
      text-decoration: underline;
    }

    .person-avatar-wrap {
      width: 120px;
      height: 120px;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      overflow: hidden;
      background: #fff;
      flex: 0 0 120px;
    }

    .person-avatar-wrap img {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .match-item,
    .item,
    .info-box,
    pre {
      border: 1px solid var(--border);
      border-radius: var(--radius);
    }

    .match-list,
    .list {
      display: grid;
      gap: 12px;
    }

    .match-list {
      grid-template-columns: repeat(auto-fit, minmax(min(100%, 150px), 1fr));
      gap: 12px;
    }

    .match-group {
      display: grid;
      gap: 10px;
    }

    .match-group + .match-group {
      margin-top: 18px;
      padding-top: 18px;
      border-top: 1px solid var(--border);
    }

    .match-group-header {
      display: grid;
      gap: 6px;
    }

    .match-group-title-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      flex-wrap: wrap;
    }

    .match-group-title {
      margin: 0;
      font-size: 16px;
      line-height: 1.4;
    }

    .match-group-note {
      margin: 0;
      font-size: 13px;
      color: var(--muted);
      line-height: 1.6;
    }

    .match-aggregate-count {
      display: inline-flex;
      align-items: center;
      padding: 6px 10px;
      border-radius: 999px;
      background: var(--primary-soft);
      color: var(--primary);
      font-size: 12px;
      font-weight: 700;
    }

    .match-item {
      overflow: hidden;
      cursor: default;
      background: #fff;
      transition: border-color 0.18s ease, box-shadow 0.18s ease;
    }

    .match-item.is-clickable {
      cursor: pointer;
    }

    .match-item.is-clickable:hover {
      border-color: rgba(37, 99, 235, 0.48);
      box-shadow: 0 10px 22px rgba(15, 23, 42, 0.08);
    }

    .match-thumb {
      aspect-ratio: 4 / 3;
      overflow: hidden;
      background: var(--surface-muted);
    }

    .match-thumb img {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .match-meta {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 12px 14px 14px;
      background: #ffffff;
      border-top: 1px solid var(--border);
    }

    .match-order,
    .article-order {
      display: inline-flex;
      min-width: 28px;
      height: 28px;
      align-items: center;
      justify-content: center;
      padding: 0 10px;
      border-radius: 999px;
      color: var(--primary);
      background: var(--primary-soft);
      font-weight: 700;
      line-height: 1.5;
    }

    .match-score,
    .image-score {
      color: var(--primary);
      font-size: 13px;
      font-weight: 700;
      line-height: 1.5;
    }

    .info-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(min(100%, 180px), 1fr));
      gap: 10px;
      margin-top: 12px;
    }

    .info-box {
      padding: 12px 14px;
      background: var(--surface-muted);
      min-width: 0;
    }

    .info-box span {
      display: block;
      font-size: 12px;
      color: var(--muted);
      text-transform: uppercase;
    }

    .info-box strong {
      display: block;
      margin-top: 4px;
      line-height: 1.5;
      overflow-wrap: anywhere;
    }

    .info-box strong a {
      color: var(--primary);
      text-decoration: none;
    }

    .info-box strong a:hover {
      text-decoration: underline;
    }

    .item {
      padding: 14px 16px;
      background: var(--surface-muted);
      min-width: 0;
    }

    .item a {
      overflow-wrap: anywhere;
    }

    .article-line-list {
      display: grid;
      gap: 8px;
    }

    .article-line-item {
      display: grid;
      gap: 4px;
      padding: 10px 12px;
      background: var(--surface-muted);
    }

    .article-line-top {
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.4;
    }

    .article-line-link,
    .article-line-title {
      display: block;
      min-width: 0;
      line-height: 1.45;
      overflow-wrap: anywhere;
      font-size: 14px;
    }

    .article-line-link {
      color: var(--text);
      text-decoration: none;
      font-weight: 700;
    }

    .article-line-link:hover {
      text-decoration: underline;
    }

    .article-line-title {
      font-weight: 700;
    }

    .article-line-site {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .debug-details summary {
      cursor: pointer;
      color: var(--primary);
      font-weight: 700;
      margin-bottom: 12px;
      border-radius: var(--radius-sm);
    }

    .debug-details[open] summary {
      margin-bottom: 14px;
    }

    .item a {
      color: var(--text);
      text-decoration: none;
      font-weight: 700;
    }

    .item a:hover {
      text-decoration: underline;
    }

    .link-row a {
      display: inline-flex;
      align-items: center;
      padding: 9px 12px;
      border-radius: var(--radius);
      border: 1px solid rgba(37, 99, 235, 0.16);
      color: var(--primary);
      text-decoration: none;
      background: var(--surface-blue);
    }

    pre {
      margin: 0;
      padding: 14px 16px;
      background: #0b1220;
      color: #e2e8f0;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
      overflow: auto;
      max-height: 520px;
      font-size: 12px;
      line-height: 1.65;
    }

    .selection-empty {
      display: grid;
      min-height: 180px;
      place-items: center;
      padding: 16px;
      color: var(--muted);
      text-align: center;
      background: var(--surface-muted);
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        scroll-behavior: auto !important;
        transition-duration: 0.01ms !important;
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
      }
    }

    @media (max-width: 960px) {
      .result-layout {
        grid-template-columns: 1fr;
      }

      .match-rail {
        position: static;
      }
    }

    @media (max-width: 640px) {
      .page {
        width: min(100% - 16px, 1240px);
        padding: 12px 0 24px;
        gap: 12px;
      }

      .card {
        padding: 16px;
      }

      .hero {
        padding-bottom: 12px;
      }

      .person-intro {
        flex-direction: column-reverse;
      }

      .person-avatar-wrap {
        width: 96px;
        height: 96px;
        flex-basis: 96px;
      }

      .section-header,
      .hero-top {
        display: grid;
      }

      .profile-sections {
        grid-template-columns: 1fr;
      }

      .match-meta {
        align-items: flex-start;
        flex-direction: column;
      }

      .article-line-item {
        align-items: flex-start;
      }

      .article-line-site {
        white-space: normal;
      }
    }
  </style>
</head>
<body>
<div class="page">
  <section class="hero">
    <div class="hero-top">
      <div class="eyebrow">Face2Info 结果页</div>
      <a class="back-link" href="/index.html">返回首页重新上传</a>
    </div>
    <h1>人物信息分析结果</h1>
    <p class="hero-copy">展示人物资料、公开账号、图片匹配与文章来源。</p>
  </section>

  <div class="result-layout">
    <div class="main-column">
      <section class="card" id="personCard">
        <div class="section-header">
          <div class="section-title">
            <span class="eyebrow">人物</span>
            <h2 id="personTitle">等待加载结果</h2>
          </div>
        </div>
        <div class="person-intro">
          <div class="person-copy">
            <div class="person-summary" id="personSummary">请在首页完成上传与选脸后再查看本页。</div>
          </div>
          <div class="person-avatar-wrap" id="personAvatarWrap" hidden>
            <img id="personAvatar" alt="人物头像" loading="lazy" referrerpolicy="no-referrer">
          </div>
        </div>
        <div id="personDetails"></div>
        <div class="profile-sections" id="profileSections"></div>
      </section>

      <section class="card" id="socialCard">
        <div class="section-header">
          <div class="section-title">
            <span class="eyebrow">公开信息</span>
            <h2>社交账号</h2>
          </div>
        </div>
        <div id="socialBody"><p class="empty">暂无公开社交账号。</p></div>
      </section>

      <section class="card" id="visionModelCard">
        <div class="section-header">
          <div class="section-title">
            <span class="eyebrow">视觉模型</span>
            <h2>Sophnet 视觉模型人物画像</h2>
          </div>
        </div>
        <div id="visionModelBody"><p class="empty">暂无视觉模型人物画像。</p></div>
      </section>

      <section class="card" id="candidatePersonCard">
        <div class="section-header">
          <div class="section-title">
            <span class="eyebrow">疑似人物</span>
            <h2>搜图候选对比画像</h2>
          </div>
        </div>
        <div id="candidatePersonBody"><p class="empty">暂无疑似人物对比画像。</p></div>
      </section>

      <section class="card" id="articleCard">
        <div class="section-header">
          <div class="section-title">
            <span class="eyebrow">公开信息</span>
            <h2>图片匹配文章来源</h2>
          </div>
        </div>
        <div id="articleBody"><p class="empty">暂无图片匹配文章来源。</p></div>
      </section>

      <section class="card" id="debugCard">
        <div class="section-header">
          <div class="section-title">
            <span class="eyebrow">调试</span>
            <h2>原始 JSON</h2>
          </div>
        </div>
        <details class="debug-details">
          <summary>查看原始 JSON</summary>
          <pre id="rawResponse">{}</pre>
        </details>
      </section>
    </div>

    <aside class="match-rail">
      <section class="card" id="matchRailCard">
        <div id="matchesBody"><p class="empty">暂无图片匹配结果。</p></div>
      </section>
    </aside>
  </div>
</div>

<script>
  const SEARCH_RESULT_KEY = "face2info:lastResult";
  const rawResponseEl = document.getElementById("rawResponse");
  const personTitle = document.getElementById("personTitle");
  const personSummary = document.getElementById("personSummary");
  const personAvatarWrap = document.getElementById("personAvatarWrap");
  const personAvatar = document.getElementById("personAvatar");
  const personDetails = document.getElementById("personDetails");
  const profileSections = document.getElementById("profileSections");
  const matchRailCard = document.getElementById("matchRailCard");
  const matchesBody = document.getElementById("matchesBody");
  const socialBody = document.getElementById("socialBody");
  const visionModelBody = document.getElementById("visionModelBody");
  const candidatePersonBody = document.getElementById("candidatePersonBody");
  const articleBody = document.getElementById("articleBody");

  matchRailCard.addEventListener("click", handleMatchClick);
  bootstrapResult();

  function bootstrapResult() {
    const raw = sessionStorage.getItem(SEARCH_RESULT_KEY);
    if (!raw) {
      renderError("未找到检索结果，请返回首页重新上传并完成人像框选择。");
      return;
    }

    let data;
    try {
      data = JSON.parse(raw);
    } catch (error) {
      renderError("结果数据解析失败，请返回首页重试。");
      return;
    }

    rawResponseEl.textContent = JSON.stringify(compactJson(data), null, 2);
    if (!data || (data.status === "failed" && !hasVisionModelPortraits(data))) {
      renderError((data && data.error) || "检索失败，请返回首页重试。");
      return;
    }
    renderFinal(data);
  }

  function hasVisionModelPortraits(data) {
    return Array.isArray(data && data.vision_model_portraits) && data.vision_model_portraits.length > 0;
  }

  function renderFinal(data) {
    const person = data.person || null;
    personTitle.textContent = person && person.name ? person.name : "未知人物";
    const summaryParagraphs = normalizeParagraphs(
      person && person.summary_paragraphs,
      person && (person.description || person.summary)
    );
    personSummary.innerHTML = renderParagraphBlock(summaryParagraphs, "暂无人物简介。", "summary-paragraph");

    const avatarUrl = person && person.image_url ? person.image_url : "";
    if (avatarUrl) {
      personAvatar.src = avatarUrl;
      personAvatarWrap.hidden = false;
    } else {
      personAvatar.removeAttribute("src");
      personAvatarWrap.hidden = true;
    }

    const tags = Array.isArray(person && person.tags) ? person.tags.filter(Boolean) : [];
    // evidence_urls 由后端聚合证据输出，前端用于补充百科入口展示。
    const evidenceUrls = Array.isArray(person && person.evidence_urls) ? person.evidence_urls : [];
    const wikipediaUrl = person && person.wikipedia ? person.wikipedia : "";
    const baikeUrl = evidenceUrls.find(url => typeof url === "string" && url.includes("baike.baidu.com")) || "";
    const basicInfo = person && person.basic_info && typeof person.basic_info === "object" ? person.basic_info : null;
    const familyBackgroundSummary = person && person.family_background_summary ? person.family_background_summary : "";

    const personMeta = [];
    const wikiLinks = [
      wikipediaUrl ? `<a href="${escapeHtml(wikipediaUrl)}" target="_blank" rel="noreferrer">Wikipedia</a>` : "",
      baikeUrl ? `<a href="${escapeHtml(baikeUrl)}" target="_blank" rel="noreferrer">百度百科</a>` : "",
      person && person.official_website ? `<a href="${escapeHtml(person.official_website)}" target="_blank" rel="noreferrer">官方网站</a>` : ""
    ].filter(Boolean).join(" / ");
    if (wikiLinks) personMeta.push(["Wiki链接", wikiLinks, true]);
    if (tags.length) personMeta.push(["标签", tags.join(" / ")]);

    personDetails.innerHTML = [
      personMeta.length ? `<div class="info-grid">${personMeta.map(([label, value, isHtml]) => `<div class="info-box"><span>${escapeHtml(label)}</span><strong>${isHtml ? value : escapeHtml(value)}</strong></div>`).join("")}</div>` : ""
    ].join("");

    profileSections.innerHTML = [
      renderBasicInfoSection(basicInfo),
      renderProfileSection("家庭背景", normalizeParagraphs(person && person.family_background_summary_paragraphs, familyBackgroundSummary), "暂无家庭背景内容。")
    ].join("");

    const matches = Array.isArray(data.image_matches) ? data.image_matches : [];
    const articleMatches = Array.isArray(data.article_image_matches) ? data.article_image_matches : matches;
    const allSortedMatches = sortImageMatches(articleMatches);
    const displayMatches = sortImageMatches(matches);
    const summarySourceArticles = collectArticleSources(person);
    renderImageMatches(displayMatches, data.status, data.error);
    renderSocial(Array.isArray(person && person.social_accounts) ? person.social_accounts : []);
    renderVisionModelPortraits(Array.isArray(data.vision_model_portraits) ? data.vision_model_portraits : []);
    renderPersonPortraitGroups(
      Array.isArray(data.person_portrait_groups) ? data.person_portrait_groups : [],
      Array.isArray(data.candidate_person_portraits) ? data.candidate_person_portraits : []
    );
    renderArticleSources(summarySourceArticles, allSortedMatches);
  }

  function sortImageMatches(matches) {
    return matches
      .map((item, index) => ({ ...item, _originalIndex: index }))
      .sort((a, b) => {
        const scoreA = Number(a.similarity_score);
        const scoreB = Number(b.similarity_score);
        const safeA = Number.isFinite(scoreA) ? scoreA : Number.NEGATIVE_INFINITY;
        const safeB = Number.isFinite(scoreB) ? scoreB : Number.NEGATIVE_INFINITY;
        if (safeA === safeB) return a._originalIndex - b._originalIndex;
        return safeB - safeA;
      });
  }

  function renderImageMatches(matches, status, error) {
    if (!matches.length) {
      matchesBody.innerHTML = `<p class="empty">${escapeHtml(status === "partial" && error ? "当前只返回了部分结果，图片匹配暂时为空。" : "暂无图片匹配结果。")}</p>`;
      return;
    }

    const groupedMatches = splitImageMatches(matches);
    let hasOpenableLink = false;
    const renderMatchCard = (item, index) => {
      // 关键逻辑：图片卡片只允许跳转到真实来源链接，禁止回退到 thumbnail_url，避免点开缩略图地址。
      const safeTitle = sanitizeDisplayText(item.title, "未命名结果");
      const safeSource = sanitizeDisplayText(item.source, "未知来源");
      const safeLink = sanitizeLink(item.link || "#");
      const canOpen = safeLink !== "#";
      if (canOpen) hasOpenableLink = true;
      const img = item.thumbnail_url
        ? `<img src="${escapeHtml(item.thumbnail_url)}" alt="${escapeHtml(safeTitle || "匹配结果")}" onerror="this.style.display='none'">`
        : '<div class="selection-empty">暂无缩略图</div>';
      return `
        <div class="match-item${canOpen ? " is-clickable" : ""}"${canOpen ? ` data-link="${escapeHtml(safeLink)}"` : ""}>
          <div class="match-thumb">${img}</div>
          <div class="match-meta">
            <span class="match-order">${index + 1}</span>
            <span class="match-score">${formatPercent(item.similarity_score)}</span>
          </div>
        </div>
      `;
    };

    const sections = [];
    sections.push(renderMatchGroup(
      "60% 以上聚合主图",
      groupedMatches.primaryMatch ? [groupedMatches.primaryMatch] : [],
      groupedMatches.primaryMatch
        ? `已聚合 ${groupedMatches.primaryMatch.aggregated_count || 1} 张相似度 60% 以上的图片，当前展示其中相似度最高的主图。`
        : "当前没有相似度达到 60% 的聚合主图。",
      groupedMatches.primaryMatch
        ? `<span class="match-aggregate-count">已聚合 ${escapeHtml(String(groupedMatches.primaryMatch.aggregated_count || 1))} 张</span>`
        : "",
      renderMatchCard
    ));
    sections.push(renderMatchGroup(
      "其他低相似度结果",
      groupedMatches.lowSimilarityMatches,
      groupedMatches.lowSimilarityMatches.length
        ? "以下结果相似度低于 60%，按相似度从高到低全部展开展示。"
        : "当前没有低于 60% 的其他结果。",
      "",
      renderMatchCard
    ));

    matchesBody.innerHTML = [
      hasOpenableLink ? '<p class="meta-line">点击带链接的图片结果可以打开对应文章页面。</p>' : '<p class="meta-line">当前图片结果未提供可跳转的文章链接。</p>',
      sections.join("")
    ].join("");
  }

  function splitImageMatches(matches) {
    return matches.reduce((result, item) => {
      if (!result.primaryMatch && item && item.aggregated_primary) {
        result.primaryMatch = item;
        return result;
      }
      result.lowSimilarityMatches.push(item);
      return result;
    }, { primaryMatch: null, lowSimilarityMatches: [] });
  }

  function renderMatchGroup(title, items, note, badgeHtml, renderCard) {
    const html = items.length
      ? `<div class="match-list">${items.slice(0, 20).map((item, index) => renderCard(item, index)).join("")}</div>`
      : '<p class="empty">暂无可展示结果。</p>';
    return `
      <section class="match-group">
        <div class="match-group-header">
          <div class="match-group-title-row">
            <h3 class="match-group-title">${escapeHtml(title)}</h3>
            ${badgeHtml}
          </div>
          <p class="match-group-note">${escapeHtml(note)}</p>
        </div>
        ${html}
      </section>
    `;
  }

  function renderSocial(accounts) {
    if (!accounts.length) {
      socialBody.innerHTML = '<p class="empty">暂无公开社交账号。</p>';
      return;
    }
    const html = accounts.map((account, index) => `
      <article class="item">
        <div class="chip">#${index + 1} ${escapeHtml(account.platform || "未知平台")}</div>
        ${account.suspected ? '<div class="chip">疑似账号</div>' : ""}
        <a href="${escapeHtml(account.url || "#")}" target="_blank" rel="noreferrer">
          ${escapeHtml(account.username || account.url || "打开链接")}
        </a>
        <p>${escapeHtml(account.source ? `${account.source} · ${account.url || "-"}` : (account.url || "-"))}</p>
      </article>
    `).join("");
    socialBody.innerHTML = `<div class="list">${html}</div>`;
  }

  function renderVisionModelPortraits(portraits) {
    if (!portraits.length) {
      visionModelBody.innerHTML = '<p class="empty">暂无视觉模型人物画像。</p>';
      return;
    }
    const html = portraits.map((portrait, index) => {
      const accounts = Array.isArray(portrait.social_accounts) ? portrait.social_accounts : [];
      const urls = Array.isArray(portrait.evidence_urls) ? portrait.evidence_urls.filter(Boolean) : [];
      const notes = Array.isArray(portrait.source_notes) ? portrait.source_notes.filter(Boolean) : [];
      const tags = Array.isArray(portrait.tags) ? portrait.tags.filter(Boolean) : [];
      const meta = [
        portrait.model ? `模型：${portrait.model}` : "",
        Number.isFinite(Number(portrait.confidence)) ? `置信度：${formatPercent(portrait.confidence)}` : "",
        portrait.company ? `单位：${portrait.company}` : "",
        portrait.position ? `职位：${portrait.position}` : ""
      ].filter(Boolean);
      return `
        <article class="vision-card">
          <div class="vision-meta">
            <span class="chip">#${index + 1} ${escapeHtml(portrait.provider || "sophnet_vision")}</span>
            ${portrait.candidate_name ? `<span class="chip">${escapeHtml(portrait.candidate_name)}</span>` : ""}
            ${tags.map(tag => `<span class="chip">${escapeHtml(tag)}</span>`).join("")}
          </div>
          ${meta.length ? `<div class="meta-line">${meta.map(escapeHtml).join(" / ")}</div>` : ""}
          <p class="vision-summary">${escapeHtml(portrait.summary || "暂无中文摘要。")}</p>
          ${renderFingerprintBlock(portrait.visual_ground_truth, "原图硬性视觉指纹")}
          ${accounts.length ? `<div class="list">${accounts.map((account, accountIndex) => `
            <article class="item">
              <div class="chip">账号 ${accountIndex + 1} ${escapeHtml(account.platform || "未知平台")}</div>
              ${account.suspected ? '<div class="chip">疑似</div>' : ""}
              ${account.url
                ? `<a href="${escapeHtml(account.url)}" target="_blank" rel="noreferrer">${escapeHtml(account.username || account.url)}</a>`
                : `<strong>${escapeHtml(account.username || "未知账号")}</strong>`}
              <p>${escapeHtml([account.source, account.confidence].filter(Boolean).join(" / ") || "-")}</p>
            </article>
          `).join("")}</div>` : '<p class="empty">该模型未返回社交账号。</p>'}
          ${urls.length ? `<ul class="vision-source-list">${urls.map((url, sourceIndex) => `
            <li><span class="article-order">${sourceIndex + 1}</span> <a href="${escapeHtml(url)}" target="_blank" rel="noreferrer">${escapeHtml(url)}</a></li>
          `).join("")}</ul>` : '<p class="empty">该模型未返回可引用来源 URL。</p>'}
          ${notes.length ? `<p class="meta-line">引用说明：${escapeHtml(notes.join(" / "))}</p>` : ""}
        </article>
      `;
    }).join("");
    visionModelBody.innerHTML = `<div class="vision-grid">${html}</div>`;
  }

  function renderPersonPortraitGroups(groups, fallbackPortraits) {
    if (!groups.length) {
      renderCandidatePersonPortraits(fallbackPortraits);
      return;
    }
    const html = groups.map((group, groupIndex) => {
      const portraits = Array.isArray(group.portraits) && group.portraits.length
        ? group.portraits
        : (group.display_portrait ? [group.display_portrait] : []);
      const cards = portraits.length
        ? portraits.map((portrait, index) => renderCandidatePersonPortraitCard(portrait, index)).join("")
        : '<p class="empty">暂无疑似人物对比画像。</p>';
      return `
        <section class="match-group">
          <div class="match-group-header">
            <div class="match-group-title-row">
              <h3 class="match-group-title">${escapeHtml(group.group_name || `人物画像${groupIndex + 1}`)}</h3>
              ${group.display_portrait ? '<span class="match-aggregate-count">包含当前展示人物</span>' : ""}
            </div>
            <p class="match-group-note">页面主展示人物和同一识别流程下的疑似人物画像统一归类展示。</p>
          </div>
          <div class="vision-grid">${cards}</div>
        </section>
      `;
    }).join("");
    candidatePersonBody.innerHTML = html;
  }

  function renderCandidatePersonPortraits(portraits) {
    if (!portraits.length) {
      candidatePersonBody.innerHTML = '<p class="empty">暂无疑似人物对比画像。</p>';
      return;
    }
    const html = portraits.map((portrait, index) => renderCandidatePersonPortraitCard(portrait, index)).join("");
    candidatePersonBody.innerHTML = `<div class="vision-grid">${html}</div>`;
  }

  function renderCandidatePersonPortraitCard(portrait, index) {
    const profile = portrait && portrait.profile ? portrait.profile : {};
    const match = portrait && portrait.image_match ? portrait.image_match : {};
    const paragraphs = normalizeParagraphs(profile.summary_paragraphs, profile.summary);
    const evidenceUrls = Array.isArray(profile.evidence_urls) ? profile.evidence_urls.filter(Boolean) : [];
    const tags = Array.isArray(profile.tags) ? profile.tags.filter(Boolean) : [];
    const portraitImageUrl = (portrait && portrait.portrait_image_url) || match.thumbnail_url || profile.image_url || "";
    return `
      <article class="vision-card">
        <div class="vision-meta">
          <span class="chip">#${index + 1} ${portrait && portrait.primary_display ? "当前展示" : "疑似人物"}</span>
          <span class="chip">${escapeHtml((portrait && portrait.candidate_name) || profile.name || "未知姓名")}</span>
          ${portrait && Number.isFinite(Number(portrait.similarity_score)) ? `<span class="chip">相似度 ${formatPercent(portrait.similarity_score)}</span>` : ""}
          ${tags.slice(0, 6).map(tag => `<span class="chip">${escapeHtml(tag)}</span>`).join("")}
        </div>
        ${portraitImageUrl ? `<img class="portrait-image" src="${escapeHtml(portraitImageUrl)}" alt="${escapeHtml((portrait && portrait.candidate_name) || profile.name || "人物画像")}" onerror="this.style.display='none'">` : '<p class="empty">暂无可展示人像。</p>'}
        ${match.title || match.source ? `<div class="meta-line">搜图来源：${escapeHtml([match.title, match.source].filter(Boolean).join(" / "))}</div>` : ""}
        ${renderFingerprintBlock(portrait && portrait.visual_fingerprint, "展示人像硬性视觉指纹")}
        ${renderFingerprintBlock(portrait && portrait.portrait_three_cross_comparison, "与人物画像三交叉对比")}
        <div class="person-summary">${renderParagraphBlock(paragraphs, "暂无候选人物画像摘要。", "summary-paragraph")}</div>
        ${evidenceUrls.length ? `<ul class="vision-source-list">${evidenceUrls.slice(0, 8).map((url, sourceIndex) => `
          <li><span class="article-order">${sourceIndex + 1}</span> <a href="${escapeHtml(url)}" target="_blank" rel="noreferrer">${escapeHtml(url)}</a></li>
        `).join("")}</ul>` : '<p class="empty">该候选人物暂无可引用来源 URL。</p>'}
      </article>
    `;
  }

  function renderFingerprintBlock(fingerprint, title) {
    const entries = Object.entries(fingerprint || {}).filter(([, value]) => value);
    if (!entries.length) return "";
    return `
      <div class="fingerprint-block">
        <div class="meta-line">${escapeHtml(title)}</div>
        <div class="fingerprint-grid">
          ${entries.map(([key, value]) => `
            <div class="fingerprint-item">
              <span class="fingerprint-key">${escapeHtml(formatFingerprintKey(key))}</span>
              <strong class="fingerprint-value">${escapeHtml(String(value))}</strong>
            </div>
          `).join("")}
        </div>
      </div>
    `;
  }

  function formatFingerprintKey(key) {
    const labels = {
      ageRange: "估计年龄段",
      skinToneEthnicity: "肤色/种族",
      hairStyleColor: "发型/发色",
      eyewear: "是否佩戴眼镜",
      clothingStyle: "穿着风格",
      environmentClues: "环境线索",
      visibleTextLogoBadge: "可见文字/Logo/工牌"
    };
    return labels[key] || key;
  }

  function buildMatchArticles(matches) {
    return matches.reduce((result, item, index) => {
      const safeTitle = sanitizeDisplayText(item.title, "");
      const safeSource = sanitizeDisplayText(item.source, "未知来源");
      const safeUrl = sanitizeLink(item.link || "");
      if (!safeTitle && safeUrl === "#") return result;
      result.push({
        order: index + 1,
        title: safeTitle || `匹配结果 ${index + 1}`,
        source: safeSource,
        url: safeUrl,
        similarity: formatPercent(item.similarity_score)
      });
      return result;
    }, []);
  }

  function collectParagraphSourceArticles(person) {
    const sourceByKey = new Map();
    getAllParagraphs(person).forEach(paragraph => {
      normalizeSources(
        paragraph && (paragraph.sources || paragraph.source_urls || paragraph.sourceUrls)
      ).forEach(source => {
        const key = source.url && source.url !== "#" ? source.url : `${source.title}|${source.source}`;
        if (!sourceByKey.has(key)) {
          sourceByKey.set(key, {
            index: source.index,
            title: source.title || "来源文章",
            source: source.source || "未知来源",
            url: source.url || "#",
            publishedAt: source.publishedAt || ""
          });
        }
      });
    });
    return Array.from(sourceByKey.values());
  }

  function collectArticleSources(person) {
    const directSources = Array.isArray(person && (person.article_sources || person.articleSources))
      ? normalizeSources(person.article_sources || person.articleSources)
      : [];
    if (directSources.length) {
      return directSources
        .map(source => ({
          index: source.index,
          title: source.title || "来源文章",
          source: source.source || "未知来源",
          url: source.url || "#",
          publishedAt: source.publishedAt || ""
        }))
        .sort((a, b) => {
          const left = Number.isInteger(a.index) ? a.index : Number.MAX_SAFE_INTEGER;
          const right = Number.isInteger(b.index) ? b.index : Number.MAX_SAFE_INTEGER;
          return left - right;
        });
    }
    return collectParagraphSourceArticles(person);
  }

  function getAllParagraphs(person) {
    if (!person || typeof person !== "object") return [];
    const paragraphKeys = [
      "summary_paragraphs",
      "family_background_summary_paragraphs"
    ];
    return paragraphKeys.flatMap(key => Array.isArray(person[key]) ? person[key] : []);
  }

  function buildCitationArticles(paragraphSourceArticles, sortedMatches) {
    const citationEntries = Array.isArray(paragraphSourceArticles)
      ? paragraphSourceArticles
          .filter(item => Number.isInteger(item.index))
          .sort((a, b) => a.index - b.index)
      : [];
    if (citationEntries.length) {
      return citationEntries.map(item => ({
        order: item.index,
        title: item.title || "来源文章",
        source: item.source || "未知来源",
        url: item.url || "#",
        publishedAt: item.publishedAt || ""
      }));
    }
    return buildMatchArticles(sortedMatches).map(item => ({
      order: item.order,
      title: item.title,
      source: item.source,
      url: item.url,
      publishedAt: ""
    }));
  }

  function renderMatchArticle(item) {
    const siteText = [item.source, item.publishedAt].filter(Boolean).join(" / ");
    return `
      <article class="item article-line-item match-article-item" id="article-ref-${item.order}">
        <div class="article-line-top">
          <span class="article-order">${item.order}</span>
          <span class="article-line-site">${escapeHtml(siteText || "未知来源")}</span>
        </div>
        ${item.url !== "#"
          ? `<a class="article-line-link" href="${escapeHtml(item.url)}" target="_blank" rel="noreferrer">${escapeHtml(item.title)}</a>`
          : `<strong class="article-line-title">${escapeHtml(item.title)}</strong>`}
      </article>
    `;
  }

  function renderArticleSources(paragraphSourceArticles, sortedMatches) {
    const matchArticles = buildCitationArticles(paragraphSourceArticles, sortedMatches);
    articleBody.innerHTML = matchArticles.length
      ? `<div class="article-line-list match-article-list">${matchArticles.map(renderMatchArticle).join("")}</div>`
      : '<p class="empty">暂无图片匹配文章来源。</p>';
  }

  function renderError(message) {
    personTitle.textContent = "加载失败";
    personSummary.textContent = message || "请求失败。";
    personAvatar.removeAttribute("src");
    personAvatarWrap.hidden = true;
    personDetails.innerHTML = "";
    profileSections.innerHTML = "";
    matchesBody.innerHTML = '<p class="empty">当前未生成图片匹配结果。</p>';
    socialBody.innerHTML = '<p class="empty">当前未生成社交账号结果。</p>';
    articleBody.innerHTML = '<p class="empty">当前未生成图片匹配文章来源。</p>';
    rawResponseEl.textContent = "{}";
  }

  function formatPercent(value) {
    const num = Number(value);
    if (!Number.isFinite(num)) return "-";
    return `${(num <= 1 ? num * 100 : num).toFixed(2)}%`;
  }

  function escapeHtml(value) {
    return String(value)
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;")
      .replace(/'/g, "&#39;");
  }

  function isTempHostUrl(value) {
    if (!value || typeof value !== "string") return false;
    return /https?:\/\/[^\s]*(tempfile|tmpfiles)/i.test(value);
  }

  function sanitizeDisplayText(value, fallback) {
    // 临时图床字段不直接展示，统一回退为可读占位文本。
    if (isTempHostUrl(value)) return fallback;
    return value || fallback;
  }

  function sanitizeLink(value) {
    // 临时图床和空链接统一禁止跳转，避免点开回传源或无效地址。
    if (!value || isTempHostUrl(value)) return "#";
    return value;
  }

  function compactJson(data) {
    return {
      status: data && data.status ? data.status : null,
      error: data && data.error ? data.error : null,
      warnings: Array.isArray(data && data.warnings) ? data.warnings.slice(0, 8) : [],
      person: data && data.person ? {
        name: data.person.name || null,
        image_url: data.person.image_url || null,
        summary: data.person.summary || null,
        family_background_summary: data.person.family_background_summary || null,
        basic_info: data.person.basic_info || null,
        tags: Array.isArray(data.person.tags) ? data.person.tags.slice(0, 12) : [],
        article_sources: Array.isArray(data.person.article_sources) ? data.person.article_sources.slice(0, 20).map(item => ({
          index: Number.isInteger(item && item.index) ? item.index : null,
          title: sanitizeDisplayText(item && item.title, null),
          url: sanitizeLink(item && item.url ? item.url : "#"),
          source: sanitizeDisplayText(item && item.source, null),
          published_at: item && (item.published_at || item.publishedAt) ? String(item.published_at || item.publishedAt).trim() : null
        })) : [],
        evidence_urls: Array.isArray(data.person.evidence_urls) ? data.person.evidence_urls.slice(0, 12) : [],
        wikipedia: data.person.wikipedia || null,
        official_website: data.person.official_website || null
      } : null,
      vision_model_portraits: Array.isArray(data && data.vision_model_portraits)
        ? data.vision_model_portraits.slice(0, 5)
        : [],
      candidate_person_portraits: Array.isArray(data && data.candidate_person_portraits)
        ? data.candidate_person_portraits.slice(0, 3)
        : [],
      person_portrait_groups: Array.isArray(data && data.person_portrait_groups)
        ? data.person_portrait_groups.slice(0, 3)
        : [],
      image_matches: Array.isArray(data && data.image_matches) ? data.image_matches.slice(0, 20).map(item => ({
        position: item.position || null,
        title: sanitizeDisplayText(item.title, null),
        source: sanitizeDisplayText(item.source, null),
        thumbnail_url: item.thumbnail_url ? shorten(item.thumbnail_url) : null,
        similarity_score: item.similarity_score || null,
        aggregated_primary: Boolean(item.aggregated_primary),
        aggregated_count: item.aggregated_count || 0
      })) : [],
      article_image_matches: Array.isArray(data && data.article_image_matches) ? data.article_image_matches.slice(0, 20).map(item => ({
        position: item.position || null,
        title: sanitizeDisplayText(item.title, null),
        source: sanitizeDisplayText(item.source, null),
        thumbnail_url: item.thumbnail_url ? shorten(item.thumbnail_url) : null,
        similarity_score: item.similarity_score || null,
        aggregated_primary: Boolean(item.aggregated_primary),
        aggregated_count: item.aggregated_count || 0
      })) : []
    };
  }

  function shorten(value) {
    const text = String(value);
    return text.length <= 120 ? text : `${text.slice(0, 72)}...${text.slice(-24)}`;
  }

  function handleMatchClick(event) {
    const target = event.target.closest("[data-link]");
    if (!target) return;
    const link = target.dataset.link;
    if (!link || link === "#") return;
    window.open(link, "_blank", "noreferrer");
  }

  function normalizeParagraphs(paragraphs, fallbackText) {
    if (Array.isArray(paragraphs) && paragraphs.length) {
      return paragraphs
        .map(item => ({
          text: item && typeof item.text === "string" ? item.text.trim() : "",
          sources: normalizeSources(item && (item.sources || item.source_urls || item.sourceUrls))
        }))
        .filter(item => item.text);
    }
    const text = fallbackText && String(fallbackText).trim();
    return text ? [{ text, sources: [] }] : [];
  }

  function normalizeSources(sources) {
    if (!Array.isArray(sources)) return [];
    return sources
      .map(item => ({
        index: Number.isInteger(item && item.index) ? item.index : null,
        title: sanitizeDisplayText(item && item.title, "来源文章"),
        url: sanitizeLink(item && item.url ? item.url : "#"),
        source: sanitizeDisplayText(item && item.source, ""),
        publishedAt: item && (item.published_at || item.publishedAt) ? String(item.published_at || item.publishedAt).trim() : ""
      }))
      .filter(item => item.title || item.url !== "#");
  }

  function renderParagraphTextWithInlineCitations(text, sources) {
    const safeText = escapeHtml(text || "");
    if (!safeText) return "";
    const sourceIndexMap = new Map(
      (Array.isArray(sources) ? sources : [])
        .filter(item => Number.isInteger(item.index))
        .map(item => [item.index, item])
    );
    return safeText.replace(/\[(\d+)]/g, (_, rawIndex) => {
      const index = Number(rawIndex);
      const source = sourceIndexMap.get(index);
      if (!source) {
        return `[${rawIndex}]`;
      }
      const tooltip = [
        source.title || "来源文章",
        source.source || "",
        source.url && source.url !== "#" ? source.url : ""
      ].filter(Boolean).join("\n");
      const href = source.url && source.url !== "#" ? source.url : "#";
      const attrs = href !== "#"
        ? ` href="${escapeHtml(href)}" target="_blank" rel="noreferrer"`
        : "";
      return `<a class="source-footnote citation-tooltip"${attrs} data-tooltip="${escapeHtml(tooltip)}">[${index}]</a>`;
    });
  }

  function renderParagraphBlock(paragraphs, emptyText, paragraphClassName, textClassName = "profile-section-body") {
    if (!Array.isArray(paragraphs) || !paragraphs.length) {
      return `<span class="profile-section-empty">${escapeHtml(emptyText)}</span>`;
    }
    return paragraphs.map(item => `
      <div class="${escapeHtml(paragraphClassName)}">
        <span class="${escapeHtml(textClassName)}">${renderParagraphTextWithInlineCitations(item.text, item.sources)}</span>
      </div>
    `).join("");
  }

  function renderBasicInfoSection(info) {
    const fields = [
      ["出生日期", info && info.birth_date],
      ["教育经历", info && info.education],
      ["职业身份", info && info.occupations],
      ["人物简介", info && info.biographies]
    ]
      .map(([label, value]) => [label, formatBasicInfoValue(value)])
      .filter(([, value]) => value);

    return `
      <section class="profile-section">
        <div class="profile-section-header">
          <h3 class="profile-section-title">基本信息</h3>
        </div>
        ${fields.length
          ? `<div class="info-grid">${fields.map(([label, value]) => `<div class="info-box"><span>${escapeHtml(label)}</span><strong>${escapeHtml(value)}</strong></div>`).join("")}</div>`
          : '<span class="profile-section-empty">暂无基本信息。</span>'}
      </section>
    `;
  }

  function formatBasicInfoValue(value) {
    if (Array.isArray(value)) {
      return value.map(item => String(item || "").trim()).filter(Boolean).join(" / ");
    }
    return value ? String(value).trim() : "";
  }

  function renderProfileSection(title, paragraphs, emptyText) {
    return `
      <section class="profile-section">
        <div class="profile-section-header">
          <h3 class="profile-section-title">${escapeHtml(title)}</h3>
        </div>
        ${renderParagraphBlock(paragraphs, emptyText, "profile-section-paragraph")}
      </section>
    `;
  }
</script>
</body>
</html>
