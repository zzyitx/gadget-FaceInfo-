<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Face2Info 人脸信息聚合</title>
  <style>
    :root {
      --bg: #f7efe6;
      --surface: rgba(255, 250, 246, 0.95);
      --surface-2: rgba(255, 255, 255, 0.88);
      --border: rgba(41, 28, 20, 0.12);
      --text: #1f1712;
      --muted: #675a51;
      --primary: #8c3f25;
      --primary-2: #b85b33;
      --shadow: 0 18px 38px rgba(59, 34, 20, 0.14);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--text);
      font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
      background:
        radial-gradient(circle at top left, rgba(184, 91, 51, 0.13), transparent 28%),
        linear-gradient(180deg, #f8f2eb, var(--bg));
    }

    .page {
      width: min(920px, calc(100% - 24px));
      margin: 20px auto 36px;
      display: grid;
      gap: 16px;
    }

    .hero,
    .upload-card,
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 24px;
      box-shadow: var(--shadow);
      padding: 22px;
    }

    .eyebrow,
    .pill {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 700;
      padding: 8px 12px;
    }

    .eyebrow {
      color: var(--primary);
      background: rgba(140, 63, 37, 0.12);
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .pill {
      color: var(--primary);
      background: rgba(140, 63, 37, 0.08);
      padding: 7px 12px;
    }

    h1,
    h2 {
      margin: 0;
      font-family: Georgia, serif;
      letter-spacing: -0.02em;
    }

    .hero h1 {
      margin-top: 12px;
      font-size: clamp(34px, 5vw, 56px);
      line-height: 1;
    }

    .hero-copy,
    .section-summary,
    .tip,
    .selection-note,
    .selection-progress,
    .empty,
    .meta-line,
    .face-card-meta,
    .face-card-bbox {
      color: var(--muted);
      line-height: 1.7;
    }

    .section-title {
      display: grid;
      gap: 10px;
    }

    .dropzone,
    .selection-preview,
    .meta-box,
    .face-card {
      border: 1px solid rgba(41, 28, 20, 0.12);
      border-radius: 18px;
    }

    .dropzone {
      padding: 16px;
      background: rgba(255, 255, 255, 0.74);
    }

    input[type="file"] { width: 100%; }

    .preview {
      display: none;
      margin-top: 12px;
      overflow: hidden;
      border-radius: 18px;
      padding: 8px;
      background: rgba(255, 255, 255, 0.92);
    }

    .preview img {
      display: block;
      width: 100%;
      max-height: 520px;
      height: auto;
      object-fit: contain;
      object-position: center;
    }

    button {
      width: 100%;
      padding: 16px 18px;
      border: 0;
      border-radius: 999px;
      color: #fff;
      background: linear-gradient(135deg, var(--primary), var(--primary-2));
      font: inherit;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 12px 24px rgba(140, 63, 37, 0.24);
    }

    button:disabled {
      opacity: 0.7;
      cursor: wait;
      box-shadow: none;
    }

    .selection-card[hidden] { display: none !important; }

    .selection-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
      margin-bottom: 14px;
    }

    .selection-top {
      display: grid;
      grid-template-columns: minmax(0, 1.3fr) minmax(220px, 0.7fr);
      gap: 14px;
      margin-bottom: 14px;
    }

    .selection-preview {
      overflow: auto;
      background: var(--surface-2);
      min-height: 240px;
      display: grid;
      place-items: center;
      padding: 8px;
    }

    .selection-preview img {
      display: block;
      width: 100%;
      max-height: 520px;
      height: auto;
      object-fit: contain;
      object-position: center;
    }

    .selection-empty {
      display: grid;
      place-items: center;
      min-height: 240px;
      padding: 20px;
      color: var(--muted);
      text-align: center;
    }

    .selection-meta {
      display: grid;
      gap: 10px;
    }

    .meta-box {
      padding: 14px 16px;
      background: rgba(255, 255, 255, 0.78);
    }

    .meta-box span {
      display: block;
      font-size: 12px;
      text-transform: uppercase;
      color: var(--muted);
    }

    .meta-box strong {
      display: block;
      margin-top: 4px;
      line-height: 1.5;
      word-break: break-word;
    }

    .selection-progress {
      margin-top: 12px;
      padding: 12px 14px;
      border: 1px solid rgba(140, 63, 37, 0.14);
      border-radius: 16px;
      background: rgba(140, 63, 37, 0.08);
    }

    .face-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 12px;
      margin-top: 12px;
    }

    .face-card {
      padding: 0;
      overflow: hidden;
      background: #fff;
      text-align: left;
      cursor: pointer;
      border-radius: 18px;
    }

    .face-card:disabled {
      opacity: 0.72;
      cursor: wait;
    }

    .face-card.is-selected {
      border-color: var(--primary-2);
      box-shadow: 0 14px 28px rgba(140, 63, 37, 0.16);
    }

    .face-card img {
      display: block;
      width: 100%;
      aspect-ratio: 1 / 1;
      object-fit: cover;
    }

    .face-placeholder {
      display: grid;
      place-items: center;
      aspect-ratio: 1 / 1;
      color: var(--muted);
      padding: 18px;
      text-align: center;
      background: linear-gradient(180deg, rgba(255, 250, 246, 0.96), rgba(242, 225, 210, 0.82));
    }

    .face-card-body {
      display: grid;
      gap: 6px;
      padding: 14px 16px 16px;
      border-top: 1px solid rgba(41, 28, 20, 0.08);
    }

    .face-card-title {
      font-weight: 700;
      line-height: 1.4;
    }

    .status-card {
      background: rgba(255, 255, 255, 0.86);
    }

    @media (max-width: 980px) {
      .selection-top {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 640px) {
      .page {
        width: min(100% - 16px, 920px);
        margin: 12px auto 24px;
      }

      .hero,
      .upload-card,
      .card {
        padding: 18px;
        border-radius: 20px;
      }

      .face-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
<div class="page">
  <section class="hero">
    <div class="eyebrow">Face2Info</div>
    <h1>上传图片并选择目标人脸</h1>
    <p class="hero-copy">
      先点击 <code>开始上传</code> 完成人脸检测，勾选目标人像框后再点击 <code>开始检索</code>，
      页面会跳转到详情页展示人物聚合结果。
    </p>
  </section>

  <section class="upload-card">
    <form id="faceForm">
      <div class="section-title">
        <span class="eyebrow">上传</span>
        <h2>选择图片文件</h2>
        <p class="section-summary">支持 jpg、jpeg、png 格式。检测完成后需要先勾选人脸框。</p>
      </div>

      <div style="display:grid; gap:12px; margin-top:14px;">
        <div>
          <label for="image">选择图片文件</label>
          <div class="dropzone">
            <input id="image" name="image" type="file" accept=".jpg,.jpeg,.png,image/jpeg,image/png" required>
            <div class="tip">上传后会先调用检测接口，生成候选人脸。</div>
            <div class="preview" id="preview">
              <img id="previewImage" alt="图片预览">
            </div>
          </div>
        </div>
        <button id="submitButton" type="submit">开始上传</button>
      </div>
    </form>
  </section>

  <section class="card selection-card" id="selectionCard" hidden>
    <div class="selection-header">
      <div class="section-title">
        <span class="eyebrow">人像框选择</span>
        <h2>请选择要检索的人脸</h2>
      </div>
      <span class="pill" id="selectionCount">0 个候选</span>
    </div>
    <p class="selection-note" id="selectionNote">检测到人脸后，请点选一张人脸再点击开始检索。</p>

    <div class="selection-top">
      <div class="selection-preview" id="selectionPreview">
        <div class="selection-empty">这里会展示检测总览图。</div>
      </div>
      <div class="selection-meta">
        <div class="meta-box">
          <span>检测会话</span>
          <strong id="selectionDetectionId">-</strong>
        </div>
        <div class="meta-box">
          <span>下一步</span>
          <strong>确认人脸后点击“开始检索”跳转详情页</strong>
        </div>
      </div>
    </div>

    <div class="selection-progress" id="selectionProgress" hidden>正在继续识别所选人脸，请稍候。</div>
    <div class="face-grid" id="selectionFaceGrid"></div>
  </section>

  <section class="card status-card" id="statusCard">
    <div class="section-title">
      <span class="eyebrow">状态</span>
      <h2 id="statusTitle">等待上传图片</h2>
    </div>
    <p class="meta-line" id="statusText">上传图片后会在本页展示候选人脸，详情结果将在新页面显示。</p>
  </section>
</div>

<script>
  const SEARCH_RESULT_KEY = "face2info:lastResult";
  const form = document.getElementById("faceForm");
  const imageInput = document.getElementById("image");
  const preview = document.getElementById("preview");
  const previewImage = document.getElementById("previewImage");
  const submitButton = document.getElementById("submitButton");
  const selectionCard = document.getElementById("selectionCard");
  const selectionNote = document.getElementById("selectionNote");
  const selectionCount = document.getElementById("selectionCount");
  const selectionDetectionId = document.getElementById("selectionDetectionId");
  const selectionPreview = document.getElementById("selectionPreview");
  const selectionFaceGrid = document.getElementById("selectionFaceGrid");
  const selectionProgress = document.getElementById("selectionProgress");
  const statusTitle = document.getElementById("statusTitle");
  const statusText = document.getElementById("statusText");

  const state = {
    phase: "upload",
    selection: null,
    selectedFaceId: "",
    objectUrl: "",
  };

  imageInput.addEventListener("change", handleImageChange);
  form.addEventListener("submit", handleSubmit);
  selectionFaceGrid.addEventListener("click", handleSelectionClick);

  refreshActionButton();

  function handleImageChange() {
    const [file] = imageInput.files;
    if (state.objectUrl) {
      URL.revokeObjectURL(state.objectUrl);
      state.objectUrl = "";
    }

    if (!file) {
      preview.style.display = "none";
      previewImage.removeAttribute("src");
      clearSelection();
      state.phase = "upload";
      setStatus("等待上传图片", "上传图片后会在本页展示候选人脸，详情结果将在新页面显示。");
      refreshActionButton();
      return;
    }

    const objectUrl = URL.createObjectURL(file);
    state.objectUrl = objectUrl;
    previewImage.src = objectUrl;
    preview.style.display = "block";
    previewImage.onload = () => {
      URL.revokeObjectURL(objectUrl);
      if (state.objectUrl === objectUrl) {
        state.objectUrl = "";
      }
    };

    clearSelection();
    state.phase = "upload";
    setStatus("图片已准备", "点击“开始上传”后将调用检测接口并展示候选人脸。");
    refreshActionButton();
  }

  async function handleSubmit(event) {
    event.preventDefault();
    const [file] = imageInput.files;
    if (!file) {
      setStatus("未选择图片", "请先选择一张图片后再继续。");
      return;
    }

    if (state.phase === "search") {
      await submitSelectedFace();
      return;
    }

    clearSelection();
    setBusy(true, "正在上传并检测...");
    setStatus("检测中", "正在上传图片并检测人脸，请稍候。");

    try {
      const { response, data } = await requestMultipart("/api/face2info/detect", file);
      if (!response.ok) {
        setStatus("检测失败", (data && data.error) || "检测失败，请稍后重试。");
        return;
      }

      const selection = normalizeDetectionResponse(data);
      if (!selection.faces.length) {
        setStatus("未检测到人脸", "请更换图片后重试。");
        return;
      }

      renderSelection(selection);
      state.phase = "search";
      setStatus("检测完成", "请选择要分析的人脸，然后点击“开始检索”。");
      refreshActionButton();
    } catch (error) {
      setStatus("上传失败", error.message || "上传或检测失败。");
    } finally {
      setBusy(false);
    }
  }

  async function submitSelectedFace() {
    if (!state.selection || !state.selectedFaceId) {
      selectionNote.textContent = "请先选择要识别的人脸，再点击开始检索。";
      refreshActionButton();
      return;
    }

    setBusy(true, "正在检索...");
    setSelectionButtonsDisabled(true);
    selectionProgress.hidden = false;
    selectionProgress.textContent = "正在继续识别所选人脸，请稍候。";
    setStatus("检索中", "正在聚合人物信息，完成后将自动进入详情页。");

    try {
      const payload = {
        detection_id: state.selection.detection_id,
        face_id: state.selectedFaceId
      };
      const { response, data } = await requestJson("/api/face2info/process-selected", payload);
      if (!response.ok || (data && data.status === "failed")) {
        const message = (data && data.error) || "选脸后继续识别失败。";
        setStatus("检索失败", message);
        selectionNote.textContent = message;
        return;
      }
      sessionStorage.setItem(SEARCH_RESULT_KEY, JSON.stringify(data || {}));
      window.location.href = "/result.html";
    } catch (error) {
      const message = error.message || "选脸后继续识别失败。";
      setStatus("检索失败", message);
      selectionNote.textContent = message;
    } finally {
      selectionProgress.hidden = true;
      setSelectionButtonsDisabled(false);
      setBusy(false);
    }
  }

  function handleSelectionClick(event) {
    const button = event.target.closest("button[data-face-id]");
    if (!button || button.disabled || !state.selection) {
      return;
    }
    state.selectedFaceId = button.dataset.faceId;
    markSelected(state.selectedFaceId);
    selectionNote.textContent = `已选中 ${state.selectedFaceId}，点击“开始检索”继续。`;
    refreshActionButton();
  }

  function renderSelection(selection) {
    const faces = Array.isArray(selection.faces) ? selection.faces.filter(Boolean) : [];
    state.selection = selection;
    state.selectedFaceId = "";
    selectionCard.hidden = false;
    selectionCount.textContent = `${faces.length} 个候选`;
    selectionDetectionId.textContent = selection.detection_id || "-";
    selectionNote.textContent = "请先点击一张人脸卡片，再点击“开始检索”。";

    const previewImageUrl = selection.enhanced_image_url || selection.preview_image;
    selectionPreview.innerHTML = previewImageUrl
      ? `<img src="${escapeHtml(previewImageUrl)}" alt="检测总览图">`
      : '<div class="selection-empty">这里会展示检测总览图。</div>';

    selectionFaceGrid.innerHTML = faces.map((face, index) => renderFaceCard(face, selection.detection_id, index)).join("");
    selectionProgress.hidden = true;
    setSelectionButtonsDisabled(false);
  }

  function clearSelection() {
    state.selection = null;
    state.selectedFaceId = "";
    selectionCard.hidden = true;
    selectionFaceGrid.innerHTML = "";
    selectionPreview.innerHTML = '<div class="selection-empty">这里会展示检测总览图。</div>';
    selectionNote.textContent = "检测到人脸后，请点选一张人脸再点击开始检索。";
    selectionCount.textContent = "0 个候选";
    selectionDetectionId.textContent = "-";
    selectionProgress.hidden = true;
  }

  function markSelected(faceId) {
    selectionFaceGrid.querySelectorAll(".face-card").forEach(button => {
      button.classList.toggle("is-selected", button.dataset.faceId === faceId);
    });
  }

  function setSelectionButtonsDisabled(disabled) {
    selectionFaceGrid.querySelectorAll(".face-card").forEach(button => {
      button.disabled = disabled;
    });
  }

  function setBusy(disabled, label) {
    submitButton.disabled = disabled;
    imageInput.disabled = disabled;
    if (disabled && label) {
      submitButton.textContent = label;
      return;
    }
    refreshActionButton();
  }

  function refreshActionButton() {
    if (state.phase === "search") {
      submitButton.textContent = "开始检索";
      submitButton.disabled = !state.selectedFaceId;
      return;
    }
    submitButton.textContent = "开始上传";
    submitButton.disabled = false;
  }

  function setStatus(title, text) {
    statusTitle.textContent = title;
    statusText.textContent = text;
  }

  function normalizeDetectionResponse(data) {
    const faces = Array.isArray(data && data.faces) ? data.faces.filter(Boolean) : [];
    return {
      detection_id: (data && data.detection_id) || "",
      preview_image: (data && data.preview_image) || "",
      enhanced_image_url: (data && data.enhanced_image_url) || "",
      faces: faces.map(face => ({
        face_id: face.face_id || "",
        confidence: face.confidence,
        bbox: face.bbox || null,
        crop_preview: face.crop_preview || ""
      }))
    };
  }

  function renderFaceCard(face, detectionId, index) {
    const faceId = face.face_id || `face-${index + 1}`;
    const previewHtml = face.crop_preview
      ? `<img src="${escapeHtml(face.crop_preview)}" alt="候选人脸 ${index + 1}">`
      : '<div class="face-placeholder">暂无裁剪预览</div>';
    return `
      <button type="button" class="face-card" data-face-id="${escapeHtml(faceId)}" data-detection-id="${escapeHtml(detectionId || "")}">
        ${previewHtml}
        <div class="face-card-body">
          <div class="face-card-title">候选 ${index + 1}</div>
          <div class="face-card-meta">face_id：${escapeHtml(faceId)}</div>
          <div class="face-card-meta">置信度：${formatPercent(face.confidence)}</div>
          <div class="face-card-bbox">${bboxText(face.bbox)}</div>
        </div>
      </button>
    `;
  }

  function bboxText(bbox) {
    if (!bbox) return "bbox：-";
    const x = valueOrDash(bbox.x);
    const y = valueOrDash(bbox.y);
    const w = valueOrDash(bbox.width);
    const h = valueOrDash(bbox.height);
    return `bbox：x=${x} / y=${y} / w=${w} / h=${h}`;
  }

  function valueOrDash(value) {
    return value === 0 || value ? String(value) : "-";
  }

  function formatPercent(value) {
    const num = Number(value);
    if (!Number.isFinite(num)) return "-";
    return `${(num <= 1 ? num * 100 : num).toFixed(2)}%`;
  }

  function escapeHtml(value) {
    return String(value)
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;")
      .replace(/'/g, "&#39;");
  }

  async function requestMultipart(url, file) {
    const formData = new FormData();
    formData.append("image", file);
    const response = await fetch(url, { method: "POST", body: formData });
    return readJson(response);
  }

  async function requestJson(url, payload) {
    const response = await fetch(url, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(payload)
    });
    return readJson(response);
  }

  async function readJson(response) {
    const text = await response.text();
    let data = {};
    if (text) {
      try {
        data = JSON.parse(text);
      } catch (error) {
        data = { status: "failed", error: text };
      }
    }
    return { response, data };
  }
</script>
</body>
</html>
