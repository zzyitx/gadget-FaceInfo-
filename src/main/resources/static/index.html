<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Face2Info 人脸信息聚合</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f4f7fb;
      --surface: #ffffff;
      --surface-muted: #f8fafc;
      --surface-blue: #eff6ff;
      --border: #d9e2ef;
      --border-strong: #a9b8cc;
      --text: #0b1220;
      --muted: #526071;
      --primary: #2563eb;
      --primary-strong: #1d4ed8;
      --primary-soft: #dbeafe;
      --danger: #dc2626;
      --shadow: 0 18px 46px rgba(15, 23, 42, 0.08);
      --radius: 8px;
      --radius-sm: 6px;
      --focus: 0 0 0 3px rgba(37, 99, 235, 0.24);
    }

    * { box-sizing: border-box; }

    html {
      -webkit-text-size-adjust: 100%;
    }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", "Noto Sans CJK SC", Arial, sans-serif;
      background: linear-gradient(180deg, #ffffff 0%, var(--bg) 58%, #eef4ff 100%);
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      z-index: -1;
      pointer-events: none;
      background-image:
        linear-gradient(rgba(37, 99, 235, 0.045) 1px, transparent 1px),
        linear-gradient(90deg, rgba(37, 99, 235, 0.045) 1px, transparent 1px);
      background-size: 44px 44px;
      mask-image: linear-gradient(180deg, #000 0%, transparent 72%);
    }

    .page {
      width: min(1240px, calc(100% - 32px));
      margin: 0 auto;
      padding: 24px 0 40px;
      display: grid;
      grid-template-columns: minmax(0, 1fr) 340px;
      grid-template-areas:
        "hero hero"
        "upload status"
        "selection selection";
      gap: 16px;
      align-items: start;
    }

    .upload-card,
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 24px;
      min-width: 0;
    }

    .hero {
      grid-area: hero;
      display: grid;
      gap: 10px;
      padding: 2px 0 16px;
      border-bottom: 1px solid var(--border);
    }

    .upload-card {
      grid-area: upload;
    }

    .selection-card {
      grid-area: selection;
    }

    .status-card {
      grid-area: status;
      position: sticky;
      top: 16px;
      background: var(--surface);
      border-color: var(--border);
      color: var(--text);
    }

    .eyebrow,
    .pill {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: fit-content;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 700;
      line-height: 1.3;
      letter-spacing: 0;
    }

    .eyebrow {
      color: var(--primary);
      background: var(--primary-soft);
      border: 1px solid rgba(37, 99, 235, 0.16);
      padding: 7px 10px;
    }

    .pill {
      color: var(--primary);
      background: var(--surface-blue);
      border: 1px solid rgba(37, 99, 235, 0.14);
      padding: 7px 12px;
    }

    h1,
    h2 {
      margin: 0;
      letter-spacing: 0;
      color: var(--text);
    }

    .hero h1 {
      max-width: 760px;
      font-size: clamp(30px, 4.2vw, 50px);
      line-height: 1.08;
      font-weight: 750;
    }

    h2 {
      font-size: clamp(20px, 2.2vw, 28px);
      line-height: 1.22;
    }

    .hero-copy,
    .section-summary,
    .tip,
    .selection-note,
    .selection-progress,
    .empty,
    .meta-line,
    .face-card-meta,
    .face-card-bbox {
      color: var(--muted);
      line-height: 1.65;
      overflow-wrap: anywhere;
    }

    .hero-copy {
      max-width: 760px;
      margin: 0;
      font-size: 16px;
    }

    .section-summary,
    .tip,
    .selection-note,
    .selection-progress,
    .empty,
    .meta-line,
    .face-card-meta,
    .face-card-bbox {
      font-size: 14px;
    }

    .section-title {
      display: grid;
      gap: 10px;
    }

    .dropzone,
    .selection-preview,
    .meta-box,
    .face-card {
      border: 1px solid var(--border);
      border-radius: var(--radius);
    }

    .dropzone {
      display: grid;
      gap: 12px;
      padding: 16px;
      background: linear-gradient(180deg, #ffffff 0%, var(--surface-muted) 100%);
      border-style: dashed;
      border-color: var(--border-strong);
    }

    label {
      display: block;
      margin-bottom: 8px;
      color: var(--text);
      font-weight: 650;
      line-height: 1.5;
    }

    .upload-actions {
      display: grid;
      gap: 12px;
    }

    .action-slot {
      display: contents;
    }

    input[type="file"] {
      width: 100%;
      min-height: 48px;
      padding: 8px;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text);
      background: #ffffff;
      font: inherit;
    }

    input[type="file"]::file-selector-button {
      min-height: 32px;
      margin-right: 12px;
      border: 0;
      border-radius: var(--radius-sm);
      padding: 0 12px;
      color: #ffffff;
      background: var(--primary);
      font-weight: 700;
      cursor: pointer;
    }

    input:focus-visible,
    button:focus-visible {
      outline: none;
      box-shadow: var(--focus);
    }

    .preview {
      display: none;
      overflow: hidden;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: #ffffff;
    }

    .preview.preview-visible {
      display: grid;
      place-items: center;
    }

    .preview img {
      display: block;
      width: 100%;
      max-width: 100%;
      max-height: min(52vh, 520px);
      height: auto;
      object-fit: contain;
      object-position: center;
    }

    button {
      width: 100%;
      min-height: 48px;
      padding: 12px 16px;
      border: 0;
      border-radius: var(--radius);
      color: #fff;
      background: var(--primary);
      font: inherit;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 12px 24px rgba(37, 99, 235, 0.18);
      transition: transform 0.18s ease, box-shadow 0.18s ease, background 0.18s ease, opacity 0.18s ease;
    }

    button:hover:not(:disabled) {
      transform: translateY(-1px);
      background: var(--primary-strong);
      box-shadow: 0 16px 28px rgba(37, 99, 235, 0.22);
    }

    button:disabled {
      opacity: 0.56;
      cursor: wait;
      box-shadow: none;
      transform: none;
    }

    .local-debug {
      margin-top: 16px;
      padding-top: 14px;
      border-top: 1px solid var(--border);
    }

    .local-debug summary {
      width: fit-content;
      cursor: pointer;
      color: var(--primary);
      font-size: 13px;
      font-weight: 700;
      line-height: 1.5;
      border-radius: var(--radius-sm);
    }

    .local-debug[open] summary {
      margin-bottom: 12px;
    }

    .debug-import-panel {
      display: grid;
      gap: 10px;
      padding: 12px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--surface-muted);
    }

    .debug-import-panel input[type="file"] {
      min-height: 42px;
      font-size: 13px;
    }

    .debug-import-tip {
      margin: 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.6;
    }

    .selection-card[hidden] { display: none !important; }

    .selection-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
      margin-bottom: 12px;
    }

    .selection-top {
      display: grid;
      grid-template-columns: minmax(0, 1.3fr) minmax(260px, 0.7fr);
      gap: 14px;
      margin-bottom: 14px;
    }

    .selection-preview {
      overflow: auto;
      background: var(--surface-muted);
      min-height: 240px;
      display: grid;
      place-items: center;
      padding: 8px;
    }

    .selection-preview img {
      display: block;
      width: 100%;
      max-width: 100%;
      max-height: 520px;
      height: auto;
      object-fit: contain;
      object-position: center;
    }

    .selection-empty {
      display: grid;
      place-items: center;
      min-height: 240px;
      padding: 20px;
      color: var(--muted);
      text-align: center;
    }

    .selection-meta {
      display: grid;
      gap: 10px;
    }

    .meta-box {
      padding: 14px 16px;
      background: var(--surface-muted);
    }

    .meta-box span {
      display: block;
      font-size: 12px;
      color: var(--muted);
      letter-spacing: 0;
    }

    .meta-box strong {
      display: block;
      margin-top: 4px;
      line-height: 1.5;
      word-break: break-word;
    }

    .selection-progress {
      margin-top: 12px;
      padding: 12px 14px;
      border: 1px solid rgba(37, 99, 235, 0.18);
      border-radius: var(--radius);
      background: var(--surface-blue);
    }

    .face-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(172px, 1fr));
      gap: 12px;
      margin-top: 12px;
    }

    .face-card {
      display: grid;
      padding: 0;
      overflow: hidden;
      background: #fff;
      color: var(--text);
      text-align: left;
      cursor: pointer;
      box-shadow: none;
    }

    .face-card:disabled {
      opacity: 0.72;
      cursor: wait;
    }

    .face-card.is-selected {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.14);
    }

    .face-card:hover:not(:disabled) {
      transform: none;
      border-color: rgba(37, 99, 235, 0.52);
      box-shadow: 0 10px 24px rgba(15, 23, 42, 0.08);
    }

    .face-card img {
      display: block;
      width: 100%;
      aspect-ratio: 1 / 1;
      object-fit: cover;
    }

    .face-placeholder {
      display: grid;
      place-items: center;
      aspect-ratio: 1 / 1;
      color: var(--muted);
      padding: 18px;
      text-align: center;
      background: var(--surface-muted);
    }

    .face-card-body {
      display: grid;
      gap: 6px;
      padding: 14px 16px 16px;
      border-top: 1px solid var(--border);
    }

    .face-card-title {
      font-weight: 700;
      line-height: 1.4;
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        scroll-behavior: auto !important;
        transition-duration: 0.01ms !important;
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
      }
    }

    @media (max-width: 980px) {
      .page {
        grid-template-columns: 1fr;
        grid-template-areas:
          "hero"
          "upload"
          "selection"
          "status";
      }

      .status-card {
        position: static;
      }

      .selection-top {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 640px) {
      .page {
        width: min(100% - 16px, 1240px);
        padding: 12px 0 24px;
        gap: 12px;
      }

      .upload-card,
      .card {
        padding: 16px;
      }

      .hero {
        padding-bottom: 12px;
      }

      .selection-header {
        display: grid;
      }

      .preview img,
      .selection-preview img {
        max-height: 340px;
      }

      .face-grid {
        grid-template-columns: minmax(0, 1fr);
      }
    }
  </style>
</head>
<body>
<div class="page">
  <section class="hero">
    <div class="eyebrow">Face2Info</div>
    <h1>人脸信息检索工作台</h1>
    <p class="hero-copy">
      上传图片，选择目标人脸，查看公开信息聚合结果。
    </p>
  </section>

  <section class="upload-card">
    <form id="faceForm">
      <div class="section-title">
        <span class="eyebrow">上传</span>
        <h2>上传识别图片</h2>
        <p class="section-summary">单脸图片会直接检索，多脸图片会先进入候选选择。</p>
      </div>

      <div style="display:grid; gap:12px; margin-top:14px;">
        <div>
          <label for="imageInput">待识别图片</label>
          <div class="dropzone">
            <input id="imageInput" name="image" type="file" accept="image/*" required>
            <div class="tip">支持常见图片格式，建议使用清晰正面人像。</div>
            <div class="upload-actions">
              <div class="preview" id="preview">
                <img id="previewImage" alt="图片预览">
              </div>
              <div class="action-slot" id="uploadActionSlot">
                <button id="submitButton" type="submit" form="faceForm">开始分析</button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </form>
  </section>

  <section class="card selection-card" id="selectionCard" hidden>
    <div class="selection-header">
      <div class="section-title">
        <span class="eyebrow">人像框选择</span>
        <h2>请选择要检索的人脸</h2>
      </div>
      <span class="pill" id="selectionCount">0 个候选</span>
    </div>
    <p class="selection-note" id="selectionNote">检测到人脸后，请点选一张人脸再点击开始检索。</p>

    <div class="selection-top">
      <div class="selection-preview" id="selectionPreview">
        <div class="selection-empty">这里会展示检测总览图。</div>
      </div>
      <div class="selection-meta">
        <div class="meta-box">
          <span>检测会话</span>
          <strong id="selectionDetectionId">-</strong>
        </div>
        <div class="meta-box">
          <span>下一步</span>
          <strong>确认人脸后点击“开始检索”跳转详情页</strong>
        </div>
      </div>
    </div>

    <div class="selection-progress" id="selectionProgress" hidden>正在继续识别所选人脸，请稍候。</div>
    <div class="face-grid" id="selectionFaceGrid"></div>
    <div class="upload-actions" id="selectionActionContainer" hidden>
      <div class="action-slot" id="selectionActionSlot"></div>
    </div>
  </section>

  <section class="card status-card" id="statusCard">
    <div class="section-title">
      <span class="eyebrow">状态</span>
      <h2 id="statusTitle">等待上传图片</h2>
    </div>
    <p class="meta-line" id="statusText">上传后在本页完成候选选择，结果页展示聚合信息。</p>
    <details class="local-debug">
      <summary>本地调试 JSON</summary>
      <div class="debug-import-panel">
        <label for="debugJsonInput">导入 FaceInfoResponse JSON</label>
        <input id="debugJsonInput" type="file" accept="application/json,.json">
        <p class="debug-import-tip" id="debugJsonStatus">仅写入当前浏览器会话并打开结果页，不会调用上传接口。</p>
      </div>
    </details>
  </section>
</div>

<script>
  const SEARCH_RESULT_KEY = "face2info:lastResult";
  const form = document.getElementById("faceForm");
  const imageInput = document.getElementById("imageInput");
  const preview = document.getElementById("preview");
  const previewImage = document.getElementById("previewImage");
  const submitButton = document.getElementById("submitButton");
  const uploadActionSlot = document.getElementById("uploadActionSlot");
  const selectionActionContainer = document.getElementById("selectionActionContainer");
  const selectionActionSlot = document.getElementById("selectionActionSlot");
  const selectionCard = document.getElementById("selectionCard");
  const selectionNote = document.getElementById("selectionNote");
  const selectionCount = document.getElementById("selectionCount");
  const selectionDetectionId = document.getElementById("selectionDetectionId");
  const selectionPreview = document.getElementById("selectionPreview");
  const selectionFaceGrid = document.getElementById("selectionFaceGrid");
  const selectionProgress = document.getElementById("selectionProgress");
  const statusTitle = document.getElementById("statusTitle");
  const statusText = document.getElementById("statusText");
  const debugJsonInput = document.getElementById("debugJsonInput");
  const debugJsonStatus = document.getElementById("debugJsonStatus");

  // 页面级状态机：upload=首次提交检测；search=多脸场景二次提交已选人脸。
  const state = {
    phase: "upload",
    selection: null,
    selectedFaceId: "",
  };
  form.addEventListener("submit", handleSubmit);
  selectionFaceGrid.addEventListener("click", handleSelectionClick);
  imageInput.addEventListener("change", handleImagePreview);
  debugJsonInput.addEventListener("change", handleDebugJsonImport);

  refreshActionButton();
  moveActionButtonToUpload();

  async function handleSubmit(event) {
    event.preventDefault();
    const file = imageInput.files && imageInput.files[0];
    if (!file) {
      setStatus("未选择图片", "请先选择要识别的图片。");
      return;
    }

    if (state.phase === "search") {
      // 多脸分支：复用同一个提交按钮，进入“按 face_id 继续流程”接口。
      await submitSelectedFace();
      return;
    }

    clearSelection();
    setBusy(true, "分析中...");
    setStatus("处理中", "正在上传图片并检测人脸，请稍候。");

    try {
      const formData = new FormData();
      formData.append("image", file);
      const { response, data } = await requestMultipart("/api/face2info", formData);
      if (!response.ok) {
        setStatus("处理失败", (data && data.error) || "处理失败，请稍后重试。");
        return;
      }

      if (data && data.status === "selection_required" && data.selection) {
        // 主流程在多脸时不直接失败，而是切换到“先选脸再继续”的交互阶段。
        const selection = normalizeSelectionResponse(data.selection);
        if (!selection.faces.length) {
          setStatus("未检测到人脸", "请更换图片后重试。");
          return;
        }
        renderSelection(selection);
        state.phase = "search";
        setStatus("检测完成", "当前图片存在多张人脸，请先选择目标人脸，再点击“开始检索”。");
        refreshActionButton();
        return;
      }

      if (data && (data.status === "success" || data.status === "partial")) {
        sessionStorage.setItem(SEARCH_RESULT_KEY, JSON.stringify(data || {}));
        window.location.href = "/result.html";
        return;
      }

      setStatus("处理失败", (data && data.error) || "未获得可用结果，请稍后重试。");
    } catch (error) {
      setStatus("处理失败", error.message || "上传图片或处理失败。");
    } finally {
      setBusy(false);
    }
  }

  async function submitSelectedFace() {
    if (!state.selection || !state.selectedFaceId) {
      selectionNote.textContent = "请先选择要识别的人脸，再点击开始检索。";
      refreshActionButton();
      return;
    }

    setBusy(true, "正在检索...");
    setSelectionButtonsDisabled(true);
    selectionProgress.hidden = false;
    selectionProgress.textContent = "正在继续识别所选人脸，请稍候。";
    setStatus("检索中", "正在聚合人物信息，完成后将自动进入详情页。");

    try {
      const payload = {
        detection_id: state.selection.detection_id,
        face_id: state.selectedFaceId
      };
      // 选脸继续接口只传最小上下文，后端通过 detection_id 读取缓存会话与裁剪图。
      const { response, data } = await requestJson("/api/face2info/process-selected", payload);
      if (!response.ok || (data && data.status === "failed")) {
        const message = (data && data.error) || "选脸后继续识别失败。";
        setStatus("检索失败", message);
        selectionNote.textContent = message;
        return;
      }
      sessionStorage.setItem(SEARCH_RESULT_KEY, JSON.stringify(data || {}));
      window.location.href = "/result.html";
    } catch (error) {
      const message = error.message || "选脸后继续识别失败。";
      setStatus("检索失败", message);
      selectionNote.textContent = message;
    } finally {
      selectionProgress.hidden = true;
      setSelectionButtonsDisabled(false);
      setBusy(false);
    }
  }

  function handleSelectionClick(event) {
    const button = event.target.closest("button[data-face-id]");
    if (!button || button.disabled || !state.selection) {
      return;
    }
    state.selectedFaceId = button.dataset.faceId;
    markSelected(state.selectedFaceId);
    selectionNote.textContent = `已选中 ${state.selectedFaceId}，点击“开始检索”继续。`;
    refreshActionButton();
  }

  function renderSelection(selection) {
    const faces = Array.isArray(selection.faces) ? selection.faces.filter(Boolean) : [];
    state.selection = selection;
    state.selectedFaceId = "";
    selectionCard.hidden = false;
    selectionCount.textContent = `${faces.length} 个候选`;
    selectionDetectionId.textContent = selection.detection_id || "-";
    selectionNote.textContent = "请先点击一张人脸卡片，再点击“开始检索”。";

    const previewImageUrl = selection.enhanced_image_url || selection.preview_image;
    selectionPreview.innerHTML = previewImageUrl
      ? `<img src="${escapeHtml(previewImageUrl)}" alt="检测总览图">`
      : '<div class="selection-empty">这里会展示检测总览图。</div>';

    // face card 由后端会话返回，前端只负责渲染与回传 face_id，不在本地重算 bbox。
    selectionFaceGrid.innerHTML = faces.map((face, index) => renderFaceCard(face, selection.detection_id, index)).join("");
    selectionProgress.hidden = true;
    setSelectionButtonsDisabled(false);
    moveActionButtonToSelection();
  }

  function clearSelection() {
    state.selection = null;
    state.selectedFaceId = "";
    selectionCard.hidden = true;
    selectionFaceGrid.innerHTML = "";
    selectionPreview.innerHTML = '<div class="selection-empty">这里会展示检测总览图。</div>';
    selectionNote.textContent = "检测到人脸后，请点选一张人脸再点击开始检索。";
    selectionCount.textContent = "0 个候选";
    selectionDetectionId.textContent = "-";
    selectionProgress.hidden = true;
    moveActionButtonToUpload();
  }

  function markSelected(faceId) {
    selectionFaceGrid.querySelectorAll(".face-card").forEach(button => {
      button.classList.toggle("is-selected", button.dataset.faceId === faceId);
    });
  }

  function setSelectionButtonsDisabled(disabled) {
    selectionFaceGrid.querySelectorAll(".face-card").forEach(button => {
      button.disabled = disabled;
    });
  }

  function setBusy(disabled, label) {
    submitButton.disabled = disabled;
    imageInput.disabled = disabled;
    if (disabled && label) {
      submitButton.textContent = label;
      return;
    }
    refreshActionButton();
  }

  function refreshActionButton() {
    if (state.phase === "search") {
      submitButton.textContent = "开始检索";
      submitButton.disabled = !state.selectedFaceId;
      return;
    }
    submitButton.textContent = "开始分析";
    submitButton.disabled = false;
  }

  function moveActionButtonToUpload() {
    selectionActionContainer.hidden = true;
    if (submitButton.parentElement !== uploadActionSlot) {
      uploadActionSlot.appendChild(submitButton);
    }
  }

  function moveActionButtonToSelection() {
    selectionActionContainer.hidden = false;
    if (submitButton.parentElement !== selectionActionSlot) {
      selectionActionSlot.appendChild(submitButton);
    }
  }

  function handleImagePreview() {
    const file = imageInput.files && imageInput.files[0];
    if (!file) {
      previewImage.removeAttribute("src");
      preview.classList.remove("preview-visible");
      return;
    }
    const objectUrl = URL.createObjectURL(file);
    previewImage.onload = () => URL.revokeObjectURL(objectUrl);
    previewImage.src = objectUrl;
    preview.classList.add("preview-visible");
  }

  function setStatus(title, text) {
    statusTitle.textContent = title;
    statusText.textContent = text;
  }

  async function handleDebugJsonImport(event) {
    const file = event.target.files && event.target.files[0];
    if (!file) {
      return;
    }

    try {
      const data = await readLocalJsonFile(file);
      sessionStorage.setItem(SEARCH_RESULT_KEY, JSON.stringify(data || {}));
      debugJsonStatus.textContent = "已导入 JSON，正在打开结果页回放。";
      event.target.value = "";
      window.location.href = "/result.html";
    } catch (error) {
      debugJsonStatus.textContent = error.message || "JSON 导入失败，请检查文件内容。";
      event.target.value = "";
    }
  }

  async function readLocalJsonFile(file) {
    const text = await file.text();
    try {
      return JSON.parse(text);
    } catch (error) {
      throw new Error("JSON 解析失败，请选择合法的 FaceInfoResponse 文件。");
    }
  }

  function normalizeSelectionResponse(selection) {
    const faces = Array.isArray(selection && selection.faces) ? selection.faces.filter(Boolean) : [];
    return {
      detection_id: (selection && selection.detection_id) || "",
      preview_image: (selection && selection.preview_image) || "",
      enhanced_image_url: (selection && selection.enhanced_image_url) || "",
      faces: faces.map(face => ({
        face_id: face.face_id || "",
        confidence: face.confidence,
        bbox: face.bbox || null,
        crop_preview: face.crop_preview || ""
      }))
    };
  }

  function renderFaceCard(face, detectionId, index) {
    const faceId = face.face_id || `face-${index + 1}`;
    const previewHtml = face.crop_preview
      ? `<img src="${escapeHtml(face.crop_preview)}" alt="候选人脸 ${index + 1}">`
      : '<div class="face-placeholder">暂无裁剪预览</div>';
    return `
      <button type="button" class="face-card" data-face-id="${escapeHtml(faceId)}" data-detection-id="${escapeHtml(detectionId || "")}">
        ${previewHtml}
        <div class="face-card-body">
          <div class="face-card-title">候选 ${index + 1}</div>
          <div class="face-card-meta">face_id：${escapeHtml(faceId)}</div>
          <div class="face-card-meta">置信度：${formatPercent(face.confidence)}</div>
          <div class="face-card-bbox">${bboxText(face.bbox)}</div>
        </div>
      </button>
    `;
  }

  function bboxText(bbox) {
    if (!bbox) return "bbox：-";
    const x = valueOrDash(bbox.x);
    const y = valueOrDash(bbox.y);
    const w = valueOrDash(bbox.width);
    const h = valueOrDash(bbox.height);
    return `bbox：x=${x} / y=${y} / w=${w} / h=${h}`;
  }

  function valueOrDash(value) {
    return value === 0 || value ? String(value) : "-";
  }

  function formatPercent(value) {
    const num = Number(value);
    if (!Number.isFinite(num)) return "-";
    return `${(num <= 1 ? num * 100 : num).toFixed(2)}%`;
  }

  function escapeHtml(value) {
    return String(value)
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;")
      .replace(/'/g, "&#39;");
  }

  async function requestJson(url, payload) {
    const response = await fetch(url, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(payload)
    });
    return readJson(response);
  }

  async function requestMultipart(url, formData) {
    const response = await fetch(url, {
      method: "POST",
      body: formData
    });
    return readJson(response);
  }

  async function readJson(response) {
    const text = await response.text();
    let data = {};
    if (text) {
      try {
        data = JSON.parse(text);
      } catch (error) {
        // 非 JSON 场景统一折叠为 failed，保证状态展示逻辑始终可走同一分支。
        data = { status: "failed", error: text };
      }
    }
    return { response, data };
  }
</script>
</body>
</html>
