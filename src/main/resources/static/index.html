<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Face2Info 人脸信息聚合</title>
  <style>
    body {
      margin: 0;
      font-family: "Microsoft YaHei", sans-serif;
      background: #f5eee6;
      color: #201714;
    }

    .page {
      width: min(1180px, calc(100% - 24px));
      margin: 24px auto;
      display: grid;
      gap: 18px;
    }

    .hero,
    .card,
    .upload-card {
      padding: 24px;
      border: 1px solid rgba(32, 23, 20, 0.12);
      border-radius: 24px;
      background: #fffaf6;
      box-shadow: 0 18px 40px rgba(72, 44, 28, 0.12);
    }

    .main-layout,
    .secondary-grid,
    .results,
    .section-title,
    .summary-list,
    .match-list,
    .list {
      display: grid;
    }

    .main-layout,
    .secondary-grid {
      gap: 18px;
    }

    .main-layout {
      grid-template-columns: minmax(280px, 340px) minmax(0, 1fr);
      align-items: start;
    }

    .results {
      gap: 14px;
    }

    .section-title {
      gap: 14px;
    }

    .summary-list,
    .match-list,
    .list {
      gap: 12px;
      margin: 14px 0 0;
      padding: 0;
      list-style: none;
    }

    .eyebrow,
    .pill,
    .chip {
      display: inline-flex;
      align-items: center;
      padding: 8px 12px;
      border-radius: 999px;
      font-size: 12px;
    }

    .eyebrow {
      background: rgba(171, 81, 49, 0.1);
      color: #73311d;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .pill {
      background: rgba(32, 23, 20, 0.06);
    }

    .chip {
      background: rgba(171, 81, 49, 0.08);
      color: #73311d;
    }

    .hero-name,
    .hero h1 {
      margin: 0;
      font-family: Georgia, serif;
    }

    .hero h1 {
      font-size: clamp(40px, 6vw, 68px);
      line-height: 0.96;
    }

    .status {
      padding: 16px;
      border: 1px solid rgba(32, 23, 20, 0.12);
      border-radius: 18px;
      background: #fff;
    }

    .status-success {
      border-color: rgba(48, 127, 74, 0.24);
      background: #f6fff8;
    }

    .status-partial {
      border-color: rgba(171, 81, 49, 0.24);
      background: #fff9f4;
    }

    .status-failed {
      border-color: rgba(166, 58, 58, 0.24);
      background: #fff7f7;
    }

    .status-label {
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #64574f;
    }

    .status-text {
      margin-top: 8px;
      font-size: 18px;
      font-weight: 700;
    }

    .status-note,
    .meta-text,
    .empty,
    .tip,
    .item p {
      color: #64574f;
      line-height: 1.7;
    }

    .dropzone {
      padding: 16px;
      border: 1px dashed rgba(115, 49, 29, 0.28);
      border-radius: 20px;
      background: #fff;
    }

    input[type="file"] {
      width: 100%;
    }

    .preview {
      display: none;
      overflow: hidden;
      margin-top: 12px;
      border: 1px solid rgba(32, 23, 20, 0.12);
      border-radius: 18px;
    }

    .preview img {
      display: block;
      width: 100%;
      max-height: 280px;
      object-fit: cover;
    }

    button {
      width: 100%;
      padding: 16px 18px;
      border: 0;
      border-radius: 999px;
      color: #fff;
      background: linear-gradient(135deg, #73311d, #ab5131);
      font: inherit;
      font-weight: 700;
      cursor: pointer;
    }

    button:disabled {
      opacity: 0.72;
      cursor: wait;
    }

    .section-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 14px;
    }

    .image-item,
    .item {
      border: 1px solid rgba(32, 23, 20, 0.12);
      border-radius: 20px;
    }

    .image-item {
      position: relative;
      min-height: 270px;
      overflow: hidden;
      cursor: pointer;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.08), rgba(32, 23, 20, 0.72)),
        #fff;
    }

    .image-item img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .image-info {
      position: absolute;
      right: 14px;
      bottom: 14px;
      left: 14px;
      display: grid;
      gap: 6px;
      padding: 14px 16px;
      border-radius: 18px;
      background: linear-gradient(180deg, rgba(32, 23, 20, 0.22), rgba(32, 23, 20, 0.78));
      color: #fff;
    }

    .image-info .source {
      font-size: 13px;
      text-transform: uppercase;
      opacity: 0.86;
    }

    .image-info .title {
      font-size: 16px;
      line-height: 1.45;
      font-weight: 700;
    }

    .image-info .score {
      font-size: 14px;
    }

    .item {
      padding: 16px;
      background: rgba(240, 217, 202, 0.46);
    }

    .item a {
      color: #201714;
      text-decoration: none;
      font-weight: 700;
    }

    .news-card,
    .social-card,
    .debug-panel {
      padding: 0;
      overflow: hidden;
    }

    .news-card > summary,
    .social-card > summary,
    .debug-panel > summary {
      display: block;
      padding: 24px;
      cursor: pointer;
    }

    .news-card-body,
    .social-card-body,
    .debug-panel-body {
      padding: 0 24px 24px;
    }

    .news-toggle::before {
      content: "展开";
      display: inline-flex;
      justify-content: center;
      min-width: 46px;
      padding: 6px 10px;
      border-radius: 999px;
      background: rgba(171, 81, 49, 0.1);
      color: #73311d;
      font-size: 12px;
      font-weight: 700;
    }

    .news-card[open] .news-toggle::before,
    .social-card[open] .news-toggle::before,
    .debug-panel[open] .news-toggle::before {
      content: "收起";
    }

    .news-source-link {
      margin-top: 10px;
    }

    .tags {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 16px;
    }

    pre {
      margin: 12px 0 0;
      padding: 12px 14px;
      border: 1px solid rgba(32, 23, 20, 0.12);
      border-radius: 18px;
      background: #fff;
      white-space: pre-wrap;
      word-break: break-word;
    }

    @media (max-width: 1024px) {
      .main-layout,
      .secondary-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
<div class="page">
  <section class="hero">
    <div class="section-title">
      <div class="eyebrow">Face2Info</div>
      <h1>上传人脸图片，查看公开信息与图片匹配结果。</h1>
      <p class="meta-text">
        图片匹配结果来自 Serper，每张缩略图都可跳转到对应来源页面。
      </p>
    </div>
  </section>

  <div class="main-layout">
    <aside class="upload-card upload-panel" id="uploadPanel">
      <form id="faceForm">
        <div class="section-title">
          <span class="eyebrow">上传</span>
          <h2>选择图片</h2>
        </div>

        <div>
          <label for="image">选择图片文件</label>
          <div class="dropzone">
            <input
              id="image"
              name="image"
              type="file"
              accept=".jpg,.jpeg,.png,image/jpeg,image/png"
              required
            >
            <div class="tip">支持 jpg、jpeg、png 格式。</div>
            <div class="preview" id="preview">
              <img id="previewImage" alt="预览图">
            </div>
          </div>
        </div>

        <button id="submitButton" type="submit">开始检索</button>

        <section class="status" id="statusBox" aria-live="polite">
          <div class="status-label">状态</div>
          <div class="status-text" id="statusText">待开始</div>
          <div class="status-note" id="statusNote">
            检索结果会展示人物信息、图片匹配、公开账号和相关文章。
          </div>
        </section>
      </form>
    </aside>

    <main class="results">
      <section class="card primary-card" id="personCard">
        <div class="section-header">
          <div class="section-title">
            <span class="eyebrow">人物</span>
            <h2 class="hero-name">未知人物</h2>
          </div>
        </div>
        <p class="description">人物简介会优先展示在这里。</p>
      </section>

      <section class="card" id="matchesCard">
        <div class="section-header compact">
          <div class="section-title">
            <span class="eyebrow">图片匹配</span>
            <h2>匹配结果</h2>
          </div>
          <span class="pill">Serper</span>
        </div>
        <p class="empty">暂时还没有图片匹配结果。</p>
      </section>

      <section class="secondary-grid">
        <details class="card social-card" id="socialCard">
          <summary>
            <div class="section-header compact">
              <div class="section-title">
                <span class="eyebrow">公开信息</span>
                <h2>社交账号</h2>
              </div>
              <span class="pill news-toggle">已收起</span>
            </div>
          </summary>
          <div class="social-card-body">
            <p class="empty">暂时还没有公开账号。</p>
          </div>
        </details>

        <details class="card news-card" id="newsCard">
          <summary>
            <div class="section-header compact">
              <div class="section-title">
                <span class="eyebrow">公开信息</span>
                <h2>相关文章</h2>
              </div>
              <span class="pill news-toggle">已收起</span>
            </div>
          </summary>
          <div class="news-card-body">
            <p class="empty">暂时还没有相关文章。</p>
          </div>
        </details>
      </section>

      <details class="card debug-panel" id="debugPanel">
        <summary>
          <div class="section-header compact">
            <div class="section-title">
              <span class="eyebrow">调试</span>
              <h2>原始 JSON</h2>
            </div>
            <span class="pill news-toggle">已收起</span>
          </div>
        </summary>
        <div class="debug-panel-body">
          <pre id="rawResponse">{}</pre>
        </div>
      </details>
    </main>
  </div>
</div>

<script>
  const form = document.getElementById("faceForm");
  const imageInput = document.getElementById("image");
  const preview = document.getElementById("preview");
  const previewImage = document.getElementById("previewImage");
  const submitButton = document.getElementById("submitButton");
  const statusBox = document.getElementById("statusBox");
  const statusText = document.getElementById("statusText");
  const statusNote = document.getElementById("statusNote");
  const rawResponseEl = document.getElementById("rawResponse");
  const personCard = document.getElementById("personCard");
  const matchesCard = document.getElementById("matchesCard");
  const socialCard = document.getElementById("socialCard");
  const newsCard = document.getElementById("newsCard");

  imageInput.addEventListener("change", handleImageChange);
  form.addEventListener("submit", handleSubmit);
  matchesCard.addEventListener("click", handleMatchCardClick);

  function handleImageChange() {
    const [file] = imageInput.files;

    if (!file) {
      preview.style.display = "none";
      previewImage.removeAttribute("src");
      return;
    }

    const objectUrl = URL.createObjectURL(file);
    previewImage.src = objectUrl;
    preview.style.display = "block";
    previewImage.onload = function onPreviewLoad() {
      URL.revokeObjectURL(objectUrl);
    };
  }

  async function handleSubmit(event) {
    event.preventDefault();

    const [file] = imageInput.files;
    if (!file) {
      setStatus("failed", "请求失败", "请先选择一张图片。");
      return;
    }

    resetResultCards();

    const formData = new FormData();
    formData.append("image", file);

    submitButton.disabled = true;
    setStatus("loading", "检索中", "正在聚合公开信息，请稍候。");

    try {
      const response = await fetch("/api/face2info", {
        method: "POST",
        body: formData
      });
      const data = await response.json();

      rawResponseEl.textContent = JSON.stringify(buildSimplifiedJson(data), null, 2);

      if (!response.ok || data.status === "failed") {
        renderError(data);
        setStatus(
          "failed",
          "请求失败",
          data.error || "接口未返回可用结果。"
        );
        return;
      }

      renderPerson(data.person, data.status, data.error);
      renderImageMatches(data.image_matches || [], data.status, data.error);
      renderSocialAccounts(
        data.person && data.person.social_accounts ? data.person.social_accounts : []
      );
      renderArticleGroups(data.news || []);

      setStatus(
        data.status === "partial" ? "partial" : "success",
        data.status === "partial" ? "部分完成" : "已完成",
        data.error || (
          data.status === "partial"
            ? "已返回当前可用的聚合结果。"
            : "已生成人物概览和图片匹配结果。"
        )
      );
    } catch (error) {
      renderError({ error: error.message || "未知错误" });
      setStatus("failed", "请求失败", "请检查服务端日志后重试。");
    } finally {
      submitButton.disabled = false;
    }
  }

  function handleMatchCardClick(event) {
    const matchItem = event.target.closest("[data-link]");
    if (!matchItem || !matchesCard.contains(matchItem)) {
      return;
    }

    window.open(matchItem.dataset.link, "_blank");
  }

  function resetResultCards() {
    personCard.innerHTML = [
      buildSectionHeader("人物", "加载中"),
      '<p class="description">正在生成人物概览。</p>'
    ].join("");

    matchesCard.innerHTML = [
      buildLabeledHeader("图片匹配", "匹配结果", "Serper"),
      '<p class="empty">正在等待图片匹配结果。</p>'
    ].join("");

    socialCard.innerHTML = renderSocialCard('<p class="empty">正在加载公开账号。</p>');
    newsCard.innerHTML = renderNewsCard('<p class="empty">正在加载相关文章。</p>');
    rawResponseEl.textContent = "{}";
  }

  function buildSimplifiedJson(data) {
    return {
      status: data.status || null,
      error: data.error || null,
      person: data.person || null,
      image_matches: (data.image_matches || []).slice(0, 20).map(function mapMatch(item) {
        return {
          position: item.position || null,
          title: item.title || null,
          source: item.source || null,
          link: item.link || null,
          thumbnail_url: item.thumbnail_url || null,
          similarity_score: item.similarity_score || null
        };
      }),
      news: (data.news || []).slice(0, 20)
    };
  }

  function renderPerson(person, status, error) {
    if (!person) {
      personCard.innerHTML = [
        buildSectionHeader("人物", "加载失败"),
        '<p class="description">' + escapeHtml(error || "暂无人物信息。") + "</p>"
      ].join("");
      return;
    }

    const statusLabel = status === "partial" ? "部分完成" : "已完成";
    const tags = Array.isArray(person.tags) ? person.tags.filter(Boolean) : [];
    const tagsHtml = tags.length
      ? '<div class="tags">' + tags.slice(0, 8).map(function mapTag(tag) {
        return '<span class="chip">' + escapeHtml(tag) + "</span>";
      }).join("") + "</div>"
      : "";

    personCard.innerHTML = [
      buildSectionHeader("人物", person.name || "未知人物", statusLabel),
      '<p class="description">' + escapeHtml(person.description || "暂无人物简介。") + "</p>",
      tagsHtml
    ].join("");
  }

  function renderImageMatches(matches, status, error) {
    if (!matches.length) {
      matchesCard.innerHTML = [
        buildLabeledHeader("图片匹配", "匹配结果", "Serper"),
        '<p class="empty">' + escapeHtml(
          status === "partial" && error ? "当前仅返回部分结果。" : "暂无图片匹配结果。"
        ) + "</p>"
      ].join("");
      return;
    }

    const html = matches.slice(0, 20).map(function mapMatch(item, index) {
      const confidence = Number(item.similarity_score || 0).toFixed(2);
      const title = escapeHtml(item.title || "未命名结果");
      const source = escapeHtml(item.source || "未知来源");
      const target = item.link || item.thumbnail_url || "#";
      const safeTarget = escapeHtml(target);
      const image = item.thumbnail_url
        ? '<img src="' + escapeHtml(item.thumbnail_url) + '" alt="' + title + '" onerror="this.style.display=\'none\'">'
        : "";

      return [
        '<div class="image-item" data-link="' + safeTarget + '">',
        image,
        '<div class="image-info">',
        '<div class="source">#' + escapeHtml(item.position || index + 1) + " · " + source + "</div>",
        '<div class="title">' + title + "</div>",
        '<div class="score">相似度 ' + escapeHtml(confidence) + "%</div>",
        "</div>",
        "</div>"
      ].join("");
    }).join("");

    matchesCard.innerHTML = [
      buildLabeledHeader("图片匹配", "匹配结果", "Serper"),
      '<p class="meta-text">点击图片可打开对应来源页面。</p>',
      '<div class="match-list">' + html + "</div>"
    ].join("");
  }

  function renderSocialAccounts(accounts) {
    if (!accounts.length) {
      socialCard.innerHTML = renderSocialCard('<p class="empty">暂无公开账号。</p>');
      return;
    }

    const html = accounts.map(function mapAccount(account) {
      return [
        '<article class="item">',
        '<div class="pill">' + escapeHtml(account.platform || "未知平台") + "</div>",
        '<a href="' + escapeHtml(account.url || "#") + '" target="_blank" rel="noreferrer">',
        escapeHtml(account.username || account.url || "打开链接"),
        "</a>",
        "<p>" + escapeHtml(account.url || "-") + "</p>",
        "</article>"
      ].join("");
    }).join("");

    socialCard.innerHTML = renderSocialCard('<div class="list">' + html + "</div>");
  }

  function renderArticleGroups(newsList) {
    const newsHtml = renderNewsArticles(newsList);
    if (!newsHtml) {
      newsCard.innerHTML = renderNewsCard('<p class="empty">暂无相关文章。</p>');
      return;
    }

    newsCard.innerHTML = renderNewsCard(
      renderArticleSection("相关新闻", newsHtml)
    );
  }

  function renderNewsArticles(newsList) {
    if (!newsList.length) {
      return "";
    }

    return '<div class="list">' + newsList.slice(0, 20).map(function mapNewsItem(item) {
      const sourceLink = item.url
        ? '<p class="news-source-link"><a href="' + escapeHtml(item.url) + '" target="_blank" rel="noreferrer">查看原文</a></p>'
        : '<p class="news-source-link">暂无原文链接</p>';

      return [
        '<article class="item">',
        '<a href="' + escapeHtml(item.url || "#") + '" target="_blank" rel="noreferrer">',
        escapeHtml(item.title || "未命名文章"),
        "</a>",
        "<p>" + escapeHtml(item.source || "未知来源") + " | " + escapeHtml(item.published_at || "-") + "</p>",
        "<p>" + escapeHtml(item.summary || "暂无摘要。") + "</p>",
        sourceLink,
        "</article>"
      ].join("");
    }).join("") + "</div>";
  }

  function renderArticleSection(title, contentHtml) {
    return [
      '<section class="article-group">',
      '<div class="section-header compact">',
      '<div class="section-title"><h2>' + escapeHtml(title) + "</h2></div>",
      "</div>",
      contentHtml,
      "</section>"
    ].join("");
  }

  function renderError(error) {
    const message = error.error || "请求失败。";

    personCard.innerHTML = [
      buildSectionHeader("人物", "加载失败"),
      '<p class="description">' + escapeHtml(message) + "</p>"
    ].join("");

    matchesCard.innerHTML = [
      buildLabeledHeader("图片匹配", "匹配结果", "Serper"),
      '<p class="empty">请求失败后没有新的图片匹配结果。</p>'
    ].join("");

    socialCard.innerHTML = renderSocialCard('<p class="empty">请求失败后没有公开账号结果。</p>');
    newsCard.innerHTML = renderNewsCard('<p class="empty">请求失败后没有相关文章结果。</p>');
  }

  function renderNewsCard(contentHtml) {
    return [
      '<summary>',
      '<div class="section-header compact">',
      '<div class="section-title">',
      '<span class="eyebrow">公开信息</span>',
      "<h2>相关文章</h2>",
      "</div>",
      '<span class="pill news-toggle">已收起</span>',
      "</div>",
      "</summary>",
      '<div class="news-card-body">' + contentHtml + "</div>"
    ].join("");
  }

  function renderSocialCard(contentHtml) {
    return [
      '<summary>',
      '<div class="section-header compact">',
      '<div class="section-title">',
      '<span class="eyebrow">公开信息</span>',
      "<h2>社交账号</h2>",
      "</div>",
      '<span class="pill news-toggle">已收起</span>',
      "</div>",
      "</summary>",
      '<div class="social-card-body">' + contentHtml + "</div>"
    ].join("");
  }

  function buildSectionHeader(label, title, pillText) {
    const pillHtml = pillText
      ? '<span class="pill">' + escapeHtml(pillText) + "</span>"
      : "";

    return [
      '<div class="section-header">',
      '<div class="section-title">',
      '<span class="eyebrow">' + escapeHtml(label) + "</span>",
      '<h2 class="hero-name">' + escapeHtml(title) + "</h2>",
      "</div>",
      pillHtml,
      "</div>"
    ].join("");
  }

  function buildLabeledHeader(label, title, pillText) {
    return [
      '<div class="section-header compact">',
      '<div class="section-title">',
      '<span class="eyebrow">' + escapeHtml(label) + "</span>",
      "<h2>" + escapeHtml(title) + "</h2>",
      "</div>",
      '<span class="pill">' + escapeHtml(pillText) + "</span>",
      "</div>"
    ].join("");
  }

  function setStatus(kind, text, note) {
    statusBox.className = "status";

    if (kind === "success") {
      statusBox.classList.add("status-success");
    } else if (kind === "partial") {
      statusBox.classList.add("status-partial");
    } else if (kind === "failed") {
      statusBox.classList.add("status-failed");
    }

    statusText.textContent = text;
    statusNote.textContent = note;
  }

  function escapeHtml(value) {
    return String(value)
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;")
      .replace(/'/g, "&#39;");
  }
</script>
</body>
</html>
