server:
  port: 8080

spring:
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

face2info:
  api:
    serp:
      base-url: https://serpapi.com/search.json
      api-key: ${SERP_API_KEY:}
      bing-market: en-US
      connect-timeout-ms: 5000
      read-timeout-ms: 10000
      max-retries: 3
      backoff-initial-ms: 300
    news:
      base-url: https://newsapi.org/v2/everything
      api-key: ${NEWS_API_KEY:}
      language: zh
      sort-by: relevancy
      page-size: 10
      connect-timeout-ms: 5000
      read-timeout-ms: 10000
      max-retries: 3
      backoff-initial-ms: 300
    jina:
      base-url: https://r.jina.ai/
      api-key: ${JINA_API_KEY:}
      connect-timeout-ms: 5000
      read-timeout-ms: 15000
      max-retries: 2
      backoff-initial-ms: 300
    kimi:
      base-url: ${KIMI_API_BASE_URL:https://api.moonshot.cn/v1/chat/completions}
      api-key: ${KIMI_API_KEY:}
      model: ${KIMI_MODEL:moonshot-v1-8k}
      connect-timeout-ms: 5000
      read-timeout-ms: 15000
      max-retries: 2
      backoff-initial-ms: 300
      system-prompt: ${KIMI_SYSTEM_PROMPT:你是一个人物信息提取助手，只能输出JSON。}
    summary:
      enabled: true
      provider: kimi
      base-url: ${SUMMARY_API_BASE_URL:}
      api-key: ${SUMMARY_API_KEY:}
      model: ${SUMMARY_MODEL:}
      connect-timeout-ms: 5000
      read-timeout-ms: 15000
    facecheck:
      base-url: https://facecheck.id
      upload-path: /api/upload_pic
      api-key: ${FACECHECK_API_KEY:}
      connect-timeout-ms: 5000
      read-timeout-ms: 15000
      reset-prev-images: true
    proxy:
      enabled: false
      host:
      port:
  async:
    core-pool-size: 8
    max-pool-size: 16
    queue-capacity: 100
    keep-alive-seconds: 60
    thread-name-prefix: face2info-

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

logging:
  pattern:
    level: "%5p [%X{requestId:-}]"
