server:
  port: 8080

spring:
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  data:
    redis:
      host: ${REDIS_HOST:127.0.0.1}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: ${REDIS_DATABASE:0}
      timeout: 2000ms

face2info:
  search:
    query-templates:
      secondary_profile:
        - "{name}"
        - "{name} official profile"
        - "{name} company position"
        - "{english_name} official profile"
        - "{native_name} 工作单位 职位"
  api:
    google:
      search-url: https://google.serper.dev/search
      lens-url: https://google.serper.dev/lens
      api-key: ${SERPER_API_KEY:}
      hl: zh-cn
      connect-timeout-ms: 5000
      read-timeout-ms: 10000
      max-retries: 3
      backoff-initial-ms: 300
    serp:
      base-url: https://serpapi.com/search.json
      api-key: ${SERP_API_KEY:}
      bing-market: en-US
      connect-timeout-ms: 5000
      read-timeout-ms: 10000
      max-retries: 3
      backoff-initial-ms: 300
    jina:
      base-url: https://r.jina.ai/
      api-key: ${JINA_API_KEY:}
      max-page-reads: 5
      connect-timeout-ms: 5000
      read-timeout-ms: 15000
      max-retries: 2
      backoff-initial-ms: 300
    kimi:
      base-url: ${KIMI_API_BASE_URL:https://www.sophnet.com/api/open-apis/v1/chat/completions}
      api-key: ${KIMI_API_KEY:}
      model: ${KIMI_MODEL:moonshot-v1-8k}
      connect-timeout-ms: 5000
      read-timeout-ms: 75000
      max-retries: 2
      backoff-initial-ms: 2000
      system-prompt: ${KIMI_SYSTEM_PROMPT:你是一个人物信息提取助手，输出结构化文本时只输出JSON。}
    deepseek:
      base-url: ${DEEPSEEK_API_BASE_URL:https://www.sophnet.com/api/open-apis/v1/chat/completions}
      api-key: ${SOPHNET_API_KEY:}
      model: ${DEEPSEEK_MODEL:DeepSeek-V3.2-Fast}
      final-profile-model: ${DEEPSEEK_FINAL_PROFILE_MODEL:DeepSeek-V4-Pro}
      connect-timeout-ms: 5000
      read-timeout-ms: 120000
      max-retries: 2
      backoff-initial-ms: 500
      system-prompt: ${DEEPSEEK_SYSTEM_PROMPT:你是一个人物信息提取助手，输出结构化文本时只输出JSON。}
    realtime-translation:
      base-url: ${REALTIME_TRANSLATION_API_BASE_URL:https://www.sophnet.com/api/open-apis/anthropic/v1/messages}
      api-key: ${SOPHNET_API_KEY:}
      model: ${REALTIME_TRANSLATION_MODEL:DeepSeek-R1-Distill-Qwen-7B}
      connect-timeout-ms: 5000
      read-timeout-ms: 30000
      max-retries: 2
      backoff-initial-ms: 500
      system-prompt: ${REALTIME_TRANSLATION_SYSTEM_PROMPT:你是搜索查询翻译助手。只返回翻译后的单行查询词，不要解释、不要加引号、不要补充说明。}
    summary:
      enabled: true
      provider: kimi
      base-url: ${SUMMARY_API_BASE_URL:}
      api-key: ${SUMMARY_API_KEY:}
      model: ${SUMMARY_MODEL:}
      connect-timeout-ms: 5000
      read-timeout-ms: 15000
      profile-summary-batch-size: ${PROFILE_SUMMARY_BATCH_SIZE:8}
    facecheck:
      base-url: https://facecheck.id
      upload-path: /api/upload_pic
      search-path: /api/get_results
      api-key: ${FACECHECK_API_KEY:}
      poll-interval-ms: 1000
      search-timeout-ms: 15000
      reset-prev-images: true
      demo: false
    maigret:
      enabled: ${MAIGRET_ENABLED:true}
      project-path: ${MAIGRET_PROJECT_PATH:D:/ideaProject/maigret}
      executable: ${MAIGRET_EXECUTABLE:D:/ideaProject/maigret/.venv/Scripts/maigret.exe}
      command-prefix: []
      top-sites: ${OSINT_SOCIAL_SITE_LIMIT:50}
      site-timeout-seconds: ${MAIGRET_SITE_TIMEOUT_SECONDS:10}
      process-timeout-ms: ${MAIGRET_PROCESS_TIMEOUT_MS:60000}
      max-usernames: ${MAIGRET_MAX_USERNAMES:5}
      max-accounts-per-username: ${MAIGRET_MAX_ACCOUNTS_PER_USERNAME:30}
      no-recursion: true
      no-autoupdate: true
      sherlock:
        enabled: ${SHERLOCK_ENABLED:true}
        project-path: ${SHERLOCK_PROJECT_PATH:D:/ideaProject/sherlock}
        executable: ${SHERLOCK_EXECUTABLE:D:/ideaProject/sherlock/.venv/Scripts/sherlock.exe}
        script-path: sherlock
        command-prefix: []
      tookie:
        enabled: ${TOOKIE_ENABLED:true}
        project-path: ${TOOKIE_PROJECT_PATH:D:/ideaProject/tookie-osint}
        executable: ${TOOKIE_PYTHON:D:/ideaProject/tookie-osint/.venv/Scripts/python.exe}
        script-path: brib.py
        command-prefix: []
      social-sites:
        - Facebook
        - YouTube
        - Instagram
        - Twitter
        - X
        - TikTok
        - LinkedIn
        - GitHub
        - Reddit
        - Pinterest
        - Tumblr
        - Twitch
        - Flickr
        - Vimeo
        - SoundCloud
        - Spotify
        - Medium
        - Quora
        - VK
        - Telegram
        - Snapchat
        - Mastodon
        - Threads
        - Bluesky
        - Discord
        - Steam
        - StackOverflow
        - GitLab
        - BitBucket
        - Behance
        - Dribbble
        - DeviantArt
        - ArtStation
        - Goodreads
        - Kaggle
        - HackerNews
        - ProductHunt
        - Keybase
        - Patreon
        - BuyMeACoffee
        - Linktree
        - AskFM
        - Weibo
        - Zhihu
        - Douban
        - Bilibili
        - Gitee
        - Myspace
        - About.me
        - Last.fm
    rocketreach:
      enabled: ${ROCKETREACH_ENABLED:false}
      base-url: ${ROCKETREACH_API_BASE_URL:https://api.rocketreach.co/api/v2}
      person-search-path: ${ROCKETREACH_PERSON_SEARCH_PATH:/person/search}
      api-key: ${ROCKETREACH_API_KEY:}
      max-results: ${ROCKETREACH_MAX_RESULTS:5}
      connect-timeout-ms: 5000
      read-timeout-ms: 15000
      max-retries: 2
      backoff-initial-ms: 500
    sophnet-vision:
      enabled: ${SOPHNET_VISION_ENABLED:true}
      base-url: ${SOPHNET_VISION_API_BASE_URL:https://www.sophnet.com/api/open-apis/v1/chat/completions}
      api-key: ${SOPHNET_API_KEY:}
      models:
        - ${SOPHNET_VISION_GEMINI_MODEL:gemini-3.1-pro-preview}
        - ${SOPHNET_VISION_GPT_MODEL:gpt-5.5}
        - ${SOPHNET_VISION_CLAUDE_MODEL:claude-opus-4-7}
      connect-timeout-ms: 5000
      read-timeout-ms: 75000
      max-retries: 2
      backoff-initial-ms: 500
      max-evidence-urls: 8
      system-prompt: ${SOPHNET_VISION_SYSTEM_PROMPT:You are a Visual Ground Truth extractor. Use the original image as a reference object for element comparison, not as an identity source. Return strict JSON only.}
      user-prompt: |
        Build a Visual Ground Truth reference from the original image for later comparison with candidate profiles.
        Ignore the person's name predicted from the image. Only fill candidateName when the face is clearly a widely known head of state, senior public politician, or celebrity; otherwise candidateName must be an empty string.
        Extract hard visual fingerprints that can be checked against other evidence. Do not search the web and do not infer employer, position, social accounts, biography, or URLs from appearance.
        Return strict JSON only, without Markdown, apology, reasoning, or extra text:
        {
          "candidateName": "",
          "confidence": 0.0,
          "summary": "Chinese one-sentence note that this module is only a visual reference for element comparison.",
          "company": "",
          "position": "",
          "socialAccounts": [],
          "visualGroundTruth": {
            "ageRange": "estimated age range, or unknown",
            "skinToneOrEthnicity": "visible skin tone / broad ethnicity cue, or unknown",
            "hairStyleAndColor": "hair style and hair color, or unknown",
            "eyewear": "glasses / sunglasses / none / unknown",
            "clothingStyle": "formal / sportswear / uniform / workwear / casual / unknown",
            "environmentClues": "office / outdoor / vehicle / stage / landmark / unknown",
            "visibleTextLogoBadge": "visible text, logo, badge, work card, or none visible"
          },
          "evidenceUrls": [],
          "tags": ["visual_ground_truth"],
          "sourceNotes": ["Only visual facts visible in the uploaded image are used."]
        }
        Requirements:
        1. Treat this module as a comparison reference, not an identity judgment.
        2. Do not identify private or non-public people.
        3. Do not invent names, organizations, roles, social accounts, URLs, logos, or badges.
        4. Mark uncertain or invisible elements as "unknown" or "none visible".
        5. The summary must be in Chinese; field names remain English.
    compreface:
      enabled: ${COMPREFACE_ENABLED:true}
      base-url: http://127.0.0.1:8000
      connect-timeout-ms: 5000
      read-timeout-ms: 30000
      session-ttl-seconds: 600
      detection:
        api-key: ${COMPREFACE_DETECTION_API_KEY:}
        path: /api/v1/detection/detect
        det-prob-threshold: 0.8
        limit: 0
        status: false
      verification:
        api-key: ${COMPREFACE_VERIFICATION_API_KEY:}
        path: /api/v1/verification/verify
        det-prob-threshold: 0.8
        limit: 1
        prediction-count: 1
        status: false
      admin:
        base-url: http://127.0.0.1:8000
        email: ${COMPREFACE_ADMIN_EMAIL:}
        password: ${COMPREFACE_ADMIN_PASSWORD:}
    face-detection:
      base-url: http://127.0.0.1:8091
      detect-path: /detect
      connect-timeout-ms: 3000
      read-timeout-ms: 60000
      session-ttl-seconds: 600
    face-enhance:
      enabled: true
      provider: gfpgan
      connect-timeout-ms: 5000
      read-timeout-ms: 90000
      gfpgan:
        project-path: ${GFPGAN_PROJECT_PATH:D:/ideaProject/GFPGAN}
        python-command: ${GFPGAN_PYTHON:D:/ideaProject/GFPGAN/.venv/Scripts/python.exe}
        script-path: ${GFPGAN_SCRIPT_PATH:inference_gfpgan.py}
        model-version: ${GFPGAN_MODEL_VERSION:1.3}
        upscale: ${GFPGAN_UPSCALE:2}
        output-extension: ${GFPGAN_OUTPUT_EXTENSION:auto}
        background-upsampler: ${GFPGAN_BACKGROUND_UPSAMPLER:none}
        only-center-face: ${GFPGAN_ONLY_CENTER_FACE:false}
        aligned: ${GFPGAN_ALIGNED:false}
        weight: ${GFPGAN_WEIGHT:0.5}
        process-timeout-ms: ${GFPGAN_PROCESS_TIMEOUT_MS:180000}
      replicate:
        base-url: https://api.replicate.com
        api-key: ${REPLICATE_API_TOKEN:}
        model-owner: tencentarc
        model-name: gfpgan
        model-version: ${REPLICATE_GFPGAN_VERSION:0fbacf7afc6c144e5be9767cff80f25aff23e52b0708f17e20f9879b2f21516c}
        gfpgan-version: ${REPLICATE_GFPGAN_RESTORE_VERSION:v1.4}
        scale: ${REPLICATE_GFPGAN_SCALE:2}
        prefer-wait-seconds: 30
        poll-interval-ms: 1500
        poll-timeout-ms: 45000
        max-retries: 2
        backoff-initial-ms: 300
    minio:
      endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
      public-endpoint: ${MINIO_PUBLIC_ENDPOINT:http://localhost:9000}
      access-key: ${MINIO_ACCESS_KEY:minioadmin}
      secret-key: ${MINIO_SECRET_KEY:minioadmin}
      bucket: ${MINIO_BUCKET:face-bucket}
    redis-cache:
      enabled: ${REDIS_CACHE_ENABLED:false}
      key-prefix: ${REDIS_CACHE_KEY_PREFIX:face2info}
      recognition-ttl-seconds: ${REDIS_RECOGNITION_TTL_SECONDS:86400}
      final-response-ttl-seconds: ${REDIS_FINAL_RESPONSE_TTL_SECONDS:21600}
    proxy:
      enabled: false
      host:
      port:
  async:
    core-pool-size: 8
    max-pool-size: 16
    queue-capacity: 100
    keep-alive-seconds: 60
    thread-name-prefix: face2info-

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

logging:
  pattern:
    level: "%5p [%X{requestId:-}]"
