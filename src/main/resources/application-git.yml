server:
  port: 8080

spring:
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  data:
    redis:
      host: ${REDIS_HOST:127.0.0.1}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: ${REDIS_DATABASE:0}
      timeout: 2000ms

face2info:
  api:
    google:
      search-url: https://google.serper.dev/search
      lens-url: https://google.serper.dev/lens
      api-key: ${SERPER_API_KEY:}
      hl: zh-cn
      connect-timeout-ms: 5000
      read-timeout-ms: 10000
      max-retries: 3
      backoff-initial-ms: 300
    serp:
      base-url: https://serpapi.com/search.json
      api-key: ${SERP_API_KEY:}
      bing-market: en-US
      connect-timeout-ms: 5000
      read-timeout-ms: 10000
      max-retries: 3
      backoff-initial-ms: 300
    news:
      base-url: https://newsapi.org/v2/everything
      api-key: ${NEWS_API_KEY:}
      language: zh
      sort-by: relevancy
      page-size: 10
      connect-timeout-ms: 5000
      read-timeout-ms: 10000
      max-retries: 3
      backoff-initial-ms: 300
    jina:
      base-url: https://r.jina.ai/
      api-key: ${JINA_API_KEY:}
      max-page-reads: 5
      connect-timeout-ms: 5000
      read-timeout-ms: 15000
      max-retries: 2
      backoff-initial-ms: 300
    kimi:
      base-url: ${KIMI_API_BASE_URL:https://www.sophnet.com/api/open-apis/v1/chat/completions}
      api-key: ${KIMI_API_KEY:}
      model: ${KIMI_MODEL:moonshot-v1-8k}
      connect-timeout-ms: 5000
      read-timeout-ms: 15000
      max-retries: 2
      backoff-initial-ms: 300
      system-prompt: ${KIMI_SYSTEM_PROMPT:你是一个人物信息提取助手，输出结构化文本时只输出JSON。}
    summary:
      enabled: true
      provider: kimi
      base-url: ${SUMMARY_API_BASE_URL:}
      api-key: ${SUMMARY_API_KEY:}
      model: ${SUMMARY_MODEL:}
      connect-timeout-ms: 5000
      read-timeout-ms: 15000
    facecheck:
      base-url: https://facecheck.id
      upload-path: /api/upload_pic
      search-path: /api/get_results
      api-key: ${FACECHECK_API_KEY:}
      connect-timeout-ms: 5000
      read-timeout-ms: 15000
      poll-interval-ms: 1000
      search-timeout-ms: 15000
      reset-prev-images: true
      demo: false
    face-detection:
      base-url: http://127.0.0.1:8091
      detect-path: /detect
      connect-timeout-ms: 3000
      read-timeout-ms: 60000
      session-ttl-seconds: 600
    face-enhance:
      enabled: true
      provider: replicate
      connect-timeout-ms: 5000
      read-timeout-ms: 90000
    replicate:
      base-url: https://api.replicate.com
      api-key: ${REPLICATE_API_TOKEN:}
      model-owner: tencentarc
      model-name: gfpgan
        model-version: ${REPLICATE_GFPGAN_VERSION:0fbacf7afc6c144e5be9767cff80f25aff23e52b0708f17e20f9879b2f21516c}
      gfpgan-version: ${REPLICATE_GFPGAN_RESTORE_VERSION:v1.4}
      scale: ${REPLICATE_GFPGAN_SCALE:2}
      prefer-wait-seconds: 30
      poll-interval-ms: 1500
      poll-timeout-ms: 45000
      max-retries: 2
      backoff-initial-ms: 300
    minio:
      endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
      public-endpoint: ${MINIO_PUBLIC_ENDPOINT:http://localhost:9000}
      access-key: ${MINIO_ACCESS_KEY:minioadmin}
      secret-key: ${MINIO_SECRET_KEY:minioadmin}
      bucket: ${MINIO_BUCKET:face-bucket}
    redis-cache:
      enabled: ${REDIS_CACHE_ENABLED:false}
      key-prefix: ${REDIS_CACHE_KEY_PREFIX:face2info}
      recognition-ttl-seconds: ${REDIS_RECOGNITION_TTL_SECONDS:86400}
      final-response-ttl-seconds: ${REDIS_FINAL_RESPONSE_TTL_SECONDS:21600}
    proxy:
      enabled: false
      host:
      port:
  async:
    core-pool-size: 8
    max-pool-size: 16
    queue-capacity: 100
    keep-alive-seconds: 60
    thread-name-prefix: face2info-

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

logging:
  pattern:
    level: "%5p [%X{requestId:-}]"
